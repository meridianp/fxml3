[tool.poetry]
name = "fxml4-llm-analyzer"
version = "0.1.0"
description = "LLM integration for market analysis in FXML4"
authors = ["FXML4 Team"]
readme = "README.md"
packages = [{include = "fxml4_llm", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fxml4-core = { path = "../core", develop = true }
openai = "^1.0.0"
anthropic = "^0.8.0"
langchain = "^0.1.0"
pinecone-client = "^2.2.0"
tiktoken = "^0.5.0"
aiohttp = "^3.9.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
pytest-asyncio = "^0.21.0"
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.4.0"
flake8 = "^6.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"