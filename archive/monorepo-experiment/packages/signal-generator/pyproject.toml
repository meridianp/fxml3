[tool.poetry]
name = "fxml4-signal-generator"
version = "0.1.0"
description = "Trading signal generation for FXML4"
authors = ["FXML4 Team"]
readme = "README.md"
packages = [{include = "fxml4_signals", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fxml4-core = { path = "../core", develop = true }
fxml4-ml-models = { path = "../ml-models", develop = true }
pandas = "^2.0.0"
numpy = "^1.24.0"
ta = "^0.10.0"
pandas-ta = "^0.3.14b0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
pytest-asyncio = "^0.21.0"
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.4.0"
flake8 = "^6.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"