[tool.poetry]
name = "fxml4-backtesting"
version = "0.1.0"
description = "Backtesting framework for FXML4 trading strategies"
authors = ["FXML4 Team"]
readme = "README.md"
packages = [{include = "fxml4_backtesting", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fxml4-core = { path = "../core", develop = true }
fxml4-signal-generator = { path = "../signal-generator", develop = true }
pandas = "^2.0.0"
numpy = "^1.24.0"
matplotlib = "^3.7.0"
seaborn = "^0.12.0"
quantstats = "^0.0.59"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
pytest-asyncio = "^0.21.0"
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.4.0"
flake8 = "^6.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"