[tool.poetry]
name = "fxml4-core"
version = "0.1.0"
description = "Core utilities for the fxml4 project"
authors = ["cnross <cnross@example.com>"]
readme = "README.md"
packages = [
  { include = "fxml4_core", from = "src" },
]

[tool.poetry.dependencies]
python = "^3.8"
pydantic = "*"
structlog = "*"

[tool.poetry.dev-dependencies]
pytest = "*"
pytest-asyncio = "*"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"