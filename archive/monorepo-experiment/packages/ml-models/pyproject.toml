[tool.poetry]
name = "fxml4-ml-models"
version = "0.1.0"
description = "Machine learning models for FXML4"
authors = ["FXML4 Team"]
readme = "README.md"
packages = [{include = "fxml4_ml", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fxml4-core = { path = "../core", develop = true }
scikit-learn = "^1.3.0"
xgboost = "^2.0.0"
lightgbm = "^4.1.0"
pandas = "^2.0.0"
numpy = "^1.24.0"
joblib = "^1.3.0"
optuna = "^3.3.0"
shap = "^0.43.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
pytest-asyncio = "^0.21.0"
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.4.0"
flake8 = "^6.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"