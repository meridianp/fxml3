[tool.poetry]
name = "fxml4-data-collector"
version = "0.1.0"
description = "Data collection system for fxml4"
authors = ["cnross <cnross@example.com>"]
readme = "README.md"
packages = [
  { include = "fxml4_data_collector", from = "src" },
]

[tool.poetry.dependencies]
python = "^3.8"
asyncio = "*"
httpx = "*"
asyncpg = "*"

[tool.poetry.dev-dependencies]
pytest = "*"
pytest-asyncio = "*"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"