version: '3.8'

services:
  # Infrastructure services
  timescaledb:
    image: timescale/timescaledb:2.11.0-pg15
    environment:
      POSTGRES_USER: fxml4
      POSTGRES_PASSWORD: fxml4_password
      POSTGRES_DB: fxml4_db
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxml4"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: fxml4
      RABBITMQ_DEFAULT_PASS: fxml4_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microservices
  data-collector:
    build:
      context: ../../
      dockerfile: apps/trading-system/docker/Dockerfile.service
      args:
        SERVICE: data-collector
    environment:
      - FXML4_SERVICE_NAME=data-collector
      - FXML4_DATABASE_URL=postgresql://fxml4:fxml4_password@timescaledb:5432/fxml4_db
      - FXML4_RABBITMQ_URL=amqp://fxml4:fxml4_password@rabbitmq:5672
      - FXML4_REDIS_URL=redis://redis:6379
    depends_on:
      - timescaledb
      - rabbitmq
      - redis
    restart: unless-stopped

  signal-generator:
    build:
      context: ../../
      dockerfile: apps/trading-system/docker/Dockerfile.service
      args:
        SERVICE: signal-generator
    environment:
      - FXML4_SERVICE_NAME=signal-generator
      - FXML4_DATABASE_URL=postgresql://fxml4:fxml4_password@timescaledb:5432/fxml4_db
      - FXML4_RABBITMQ_URL=amqp://fxml4:fxml4_password@rabbitmq:5672
      - FXML4_REDIS_URL=redis://redis:6379
    depends_on:
      - timescaledb
      - rabbitmq
      - redis
    restart: unless-stopped

  trade-manager:
    build:
      context: ../../
      dockerfile: apps/trading-system/docker/Dockerfile.service
      args:
        SERVICE: trade-manager
    environment:
      - FXML4_SERVICE_NAME=trade-manager
      - FXML4_DATABASE_URL=postgresql://fxml4:fxml4_password@timescaledb:5432/fxml4_db
      - FXML4_RABBITMQ_URL=amqp://fxml4:fxml4_password@rabbitmq:5672
      - FXML4_REDIS_URL=redis://redis:6379
    depends_on:
      - timescaledb
      - rabbitmq
      - redis
    restart: unless-stopped

  monitor:
    build:
      context: ../../
      dockerfile: apps/trading-system/docker/Dockerfile.service
      args:
        SERVICE: monitor
    ports:
      - "8000:8000"
    environment:
      - FXML4_SERVICE_NAME=monitor
      - FXML4_DATABASE_URL=postgresql://fxml4:fxml4_password@timescaledb:5432/fxml4_db
      - FXML4_RABBITMQ_URL=amqp://fxml4:fxml4_password@rabbitmq:5672
      - FXML4_REDIS_URL=redis://redis:6379
    depends_on:
      - timescaledb
      - rabbitmq
      - redis
    restart: unless-stopped

volumes:
  timescale_data:
  rabbitmq_data:
  redis_data: