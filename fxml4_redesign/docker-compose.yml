version: "3.8"

services:
  # Time-series database
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: fxml4_timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fxml4_trading
    ports:
      - "5434:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fxml4_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache
  redis:
    image: redis:7-alpine
    container_name: fxml4_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Data Collector Service
  data_collector:
    build:
      context: .
      dockerfile: services/data_collector/Dockerfile
    container_name: fxml4_data_collector
    depends_on:
      timescaledb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=fxml4_trading
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IB_GATEWAY_HOST=${IB_GATEWAY_HOST:-127.0.0.1}
      - IB_GATEWAY_PORT=${IB_GATEWAY_PORT:-7497}
      - IB_CLIENT_ID=1
    volumes:
      - ./services/data_collector:/app
      - ./shared:/app/shared
    restart: unless-stopped

  # Signal Generator Service
  signal_generator:
    build:
      context: .
      dockerfile: services/signal_generator/Dockerfile
    container_name: fxml4_signal_generator
    depends_on:
      timescaledb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=fxml4_trading
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./services/signal_generator:/app
      - ./shared:/app/shared
      - ./models:/app/models
    restart: unless-stopped

  # LLM Analyzer Service
  llm_analyzer:
    build:
      context: .
      dockerfile: services/llm_analyzer/Dockerfile
    container_name: fxml4_llm_analyzer
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./services/llm_analyzer:/app
      - ./shared:/app/shared
    restart: unless-stopped

  # Entry Manager Service
  entry_manager:
    build:
      context: .
      dockerfile: services/entry_manager/Dockerfile
    container_name: fxml4_entry_manager
    depends_on:
      timescaledb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=fxml4_trading
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./services/entry_manager:/app
      - ./shared:/app/shared
    restart: unless-stopped

  # Trade Manager Service
  trade_manager:
    build:
      context: .
      dockerfile: services/trade_manager/Dockerfile
    container_name: fxml4_trade_manager
    depends_on:
      timescaledb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=fxml4_trading
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IB_GATEWAY_HOST=${IB_GATEWAY_HOST:-127.0.0.1}
      - IB_GATEWAY_PORT=${IB_GATEWAY_PORT:-7497}
      - IB_CLIENT_ID=2
    volumes:
      - ./services/trade_manager:/app
      - ./shared:/app/shared
    restart: unless-stopped

  # Monitor Service
  monitor:
    build:
      context: .
      dockerfile: services/monitor/Dockerfile
    container_name: fxml4_monitor
    depends_on:
      timescaledb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=fxml4_trading
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=admin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./services/monitor:/app
      - ./shared:/app/shared
    restart: unless-stopped

volumes:
  timescale_data:
  rabbitmq_data:
  redis_data:
