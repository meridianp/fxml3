[pytest]
# pytest configuration for FXML4 redesigned microservices

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test paths
testpaths = unit integration

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=../services
    --cov=../shared
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --benchmark-disable
    -p no:warnings

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    benchmark: marks tests that benchmark performance
    requires_ib: marks tests that require IB Gateway connection
    requires_db: marks tests that require database connection

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300
timeout_method = thread

# Environment variables for testing
env =
    TESTING=true
    DB_HOST=localhost
    DB_PORT=5432
    DB_NAME=fxml4_test
    RABBITMQ_HOST=localhost
    REDIS_HOST=localhost
