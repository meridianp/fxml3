site_name: FXML4 Redesigned - Microservices Trading System
site_description: A modern, scalable forex trading system built with microservices architecture
site_author: FXML4 Team
site_url: https://fxml4.github.io/fxml4-redesigned/

repo_name: fxml4/fxml4-redesigned
repo_url: https://github.com/fxml4/fxml4-redesigned
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - mermaid2:
      arguments:
        theme: "neutral"
  - mkdocstrings:
      handlers:
        python:
          paths: [services, shared]
          options:
            show_source: true
            show_signature_annotations: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: iso_datetime

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - codehilite:
      guess_lang: false
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: fxml4
      repo: fxml4-redesigned
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fxml4
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/fxml4
  version:
    provider: mike
    default: stable
  analytics:
    provider: google
    property: UA-XXXXXXXXX-X

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - First Run: getting-started/first-run.md
  - Architecture:
      - Overview: architecture/overview.md
      - Microservices: architecture/microservices.md
      - Data Flow: architecture/data-flow.md
      - Message Queue: architecture/message-queue.md
      - Database Schema: architecture/database-schema.md
  - Services:
      - Overview: services/index.md
      - Data Collector: services/data-collector.md
      - Signal Generator: services/signal-generator.md
      - LLM Analyzer: services/llm-analyzer.md
      - Entry Manager: services/entry-manager.md
      - Trade Manager: services/trade-manager.md
      - Monitor: services/monitor.md
  - Brokers:
      - Overview: brokers/overview.md
      - Message Schemas: brokers/message-schemas.md
      - Interactive Brokers: brokers/interactive-brokers.md
      - Manual Trading: brokers/manual-trading.md
      - FXCM: brokers/fxcm.md
      - Oanda: brokers/oanda.md
  - API Reference:
      - REST API: api/rest-api.md
      - Message Schemas: api/message-schemas.md
      - Webhooks: api/webhooks.md
  - Deployment:
      - Docker Compose: deployment/docker-compose.md
      - Production: deployment/production.md
      - Monitoring: deployment/monitoring.md
      - Troubleshooting: deployment/troubleshooting.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Debugging: development/debugging.md
      - Adding Brokers: development/adding-brokers.md
  - Reference:
      - Configuration: reference/configuration.md
      - Environment Variables: reference/environment-variables.md
      - Glossary: reference/glossary.md
