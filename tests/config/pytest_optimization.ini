# Pytest optimization configuration for fast parallel execution
# Usage: pytest -c tests/config/pytest_optimization.ini

[tool:pytest]
# Test execution optimization settings
minversion = 7.0
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --maxfail=5
    --disable-warnings
    --numprocesses=auto
    --dist=loadscope
    --collect-only-changed

# Parallel execution settings
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Test discovery optimization
collect_ignore = [
    "tests/archive",
    "tests/legacy",
    "tests/fixtures/broker_mock_fixtures.py",
    "tests/fixtures/event_loop_fixtures.py"
]

# Timeout settings for parallel execution
timeout = 300
timeout_method = "thread"

# Markers for test categorization and selective execution
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require services)
    slow: Slow tests (may take several seconds)
    fast: Fast tests (complete in milliseconds)
    requires_ib: Tests requiring Interactive Brokers connection
    requires_db: Tests requiring database connection
    requires_api: Tests requiring API server
    requires_network: Tests requiring network access
    security: Security-related tests
    performance: Performance and benchmarking tests
    auth: Authentication and authorization tests
    database: Database-related tests
    ml: Machine learning tests
    wave: Elliott Wave analysis tests
    backtesting: Backtesting framework tests
    api: API endpoint tests
    stress: Stress tests (high resource usage)
    compliance: Compliance and regulatory tests
    broker: Broker integration tests
    fix: FIX protocol tests
    risk: Risk management tests
    data: Data processing tests
    feature: Feature engineering tests
    edge_cases: Edge case tests
    critical: Critical system tests
    trading: Trading operation tests

# Parallel execution filters
# Run fast tests first, then slower tests
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
    ignore::pytest.PytestUnknownMarkWarning
