[pytest_stress]
# Pytest configuration for stress testing

[tool:pytest]
# Test discovery patterns for stress tests
testpaths = tests/stress
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Stress test specific markers
markers =
    stress: High-frequency trading stress tests
    stress_light: Light stress tests suitable for CI/CD
    stress_full: Full stress tests for comprehensive validation
    stress_benchmark: Benchmark tests for performance baselines
    order_stress: Order submission stress tests
    data_stress: Market data processing stress tests
    risk_stress: Risk calculation stress tests
    signal_stress: Signal generation stress tests
    memory_stress: Memory usage stress tests
    cpu_stress: CPU usage stress tests
    concurrent_stress: Concurrency stress tests
    latency_stress: Latency performance stress tests
    throughput_stress: Throughput performance stress tests
    endurance_stress: Long-running endurance tests

# Test execution settings
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --maxfail=5
    --durations=10
    --disable-warnings
    # Stress test timeout (10 minutes)
    --timeout=600
    # Show slowest tests
    --durations-min=1.0
    # Capture output for debugging
    --capture=no

# Async testing support
asyncio_mode = auto

# Timeout configuration
timeout = 600
timeout_method = thread

# Logging configuration
log_level = INFO
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Performance tuning for stress tests
# Disable collection overhead for large test suites
collect_ignore = [
    "tests/unit",
    "tests/integration",
    "tests/edge_cases",
    "tests/property_based"
]

# Memory usage monitoring
# Note: These require pytest-monitor plugin if available
monitor-skip-test = false

# Parallel execution settings
# Note: Use with caution for stress tests to avoid resource conflicts
# --numprocesses=auto can be added to addopts if pytest-xdist is available

# Filter test output for stress tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:psutil.*
    ignore::ResourceWarning
    ignore::RuntimeWarning:asyncio.*

# Stress test specific environment variables
env =
    PYTEST_STRESS_MODE=1
    FXML4_TEST_ENVIRONMENT=stress
    FXML4_LOG_LEVEL=INFO
    FXML4_STRESS_TIMEOUT=600
