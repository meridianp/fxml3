[tool:pytest]
# Pytest configuration for FXML4

# Test markers for categorizing tests with CRITICAL PREVENTION MEASURES
markers =
    # CRITICAL PREVENTION MARKERS (new)
    critical: CRITICAL tests that must pass for deployment to proceed
    mandatory: MANDATORY tests (login functionality, core user workflows)
    environment: Real environment tests against deployed services
    e2e: End-to-End user journey tests

    # Core test types
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require services)
    slow: Slow tests (may take several seconds)
    fast: Fast tests (complete in milliseconds)

    # External dependencies
    requires_ib: Tests requiring Interactive Brokers connection
    requires_fxcm: Tests requiring FXCM connection
    requires_db: Tests requiring database connection
    requires_redis: Tests requiring Redis connection
    requires_rabbitmq: Tests requiring RabbitMQ connection
    requires_api: Tests requiring API server
    requires_network: Tests requiring network access

    # Security and compliance
    security: Security-related tests
    auth: Authentication and authorization tests
    compliance: Compliance and regulatory tests

    # System components
    database: Database-related tests
    ml: Machine learning tests
    wave: Elliott Wave analysis tests
    backtesting: Backtesting framework tests
    api: API endpoint tests
    fix_protocol: FIX protocol specific tests
    broker: Broker integration tests
    trading: Trading functionality tests
    risk_management: Risk management tests

    # Performance and reliability
    performance: Performance and benchmarking tests
    stress: Stress tests (high resource usage)
    monitoring: Monitoring tests
    concurrency: Concurrency and thread safety tests

    # Environment-specific
    production: Production environment tests (read-only)
    staging: Staging environment tests
    local: Local development tests

    # Data processing
    real_time: Real-time data tests
    rabbitmq: RabbitMQ tests

    # System architecture
    functional: End-to-end functional tests
    infrastructure: Infrastructure and deployment tests
    ui: User interface and frontend tests

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=60

# Minimum version
minversion = 6.0

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning

# Collection timeout
timeout = 300
timeout_method = thread
