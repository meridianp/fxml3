# FXML4 Service-Specific Docker Compose Configuration
# Optimized containers for production deployment

version: "3.8"

services:
  # TimescaleDB for time-series data
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: fxml4-timescaledb
    environment:
      POSTGRES_DB: fxml4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${FXML4_DATABASE_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-c timezone=UTC"
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fxml4"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: fxml4-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RabbitMQ for message queuing
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fxml4-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fxml4}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fxml4}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FXML4 API Service
  fxml4-api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: fxml4-api-service
    environment:
      FXML4_DATABASE_HOST: timescaledb
      FXML4_DATABASE_PORT: 5432
      FXML4_DATABASE_NAME: fxml4
      FXML4_DATABASE_USER: postgres
      FXML4_DATABASE_PASSWORD: ${FXML4_DATABASE_PASSWORD:-postgres}
      FXML4_REDIS_HOST: redis
      FXML4_REDIS_PORT: 6379
      FXML4_RABBITMQ_HOST: rabbitmq
      FXML4_RABBITMQ_PORT: 5672
      FXML4_JWT_SECRET_KEY: ${FXML4_JWT_SECRET_KEY}
      FXML4_ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # FXML4 Signal Processing Worker
  fxml4-signal-worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: fxml4-signal-worker
    environment:
      FXML4_DATABASE_HOST: timescaledb
      FXML4_DATABASE_PORT: 5432
      FXML4_DATABASE_NAME: fxml4
      FXML4_DATABASE_USER: postgres
      FXML4_DATABASE_PASSWORD: ${FXML4_DATABASE_PASSWORD:-postgres}
      FXML4_REDIS_HOST: redis
      FXML4_RABBITMQ_HOST: rabbitmq
      FXML4_WORKER_TYPE: signal_processor
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "fxml4.workers.signal_processor"]

  # FXML4 Order Processing Worker
  fxml4-order-worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: fxml4-order-worker
    environment:
      FXML4_DATABASE_HOST: timescaledb
      FXML4_DATABASE_PORT: 5432
      FXML4_DATABASE_NAME: fxml4
      FXML4_DATABASE_USER: postgres
      FXML4_DATABASE_PASSWORD: ${FXML4_DATABASE_PASSWORD:-postgres}
      FXML4_REDIS_HOST: redis
      FXML4_RABBITMQ_HOST: rabbitmq
      FXML4_WORKER_TYPE: order_processor
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "fxml4.workers.order_processor"]

  # FXML4 Frontend Application
  fxml4-ui:
    build:
      context: ../fxml4-ui
      dockerfile: Dockerfile
    container_name: fxml4-ui
    environment:
      NEXT_PUBLIC_API_URL: http://fxml4-api:8000
      NEXT_PUBLIC_WS_URL: ws://fxml4-api:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      fxml4-api:
        condition: service_healthy
    restart: unless-stopped

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: fxml4-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: fxml4-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  timescaledb_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: fxml4-network
    driver: bridge
