# System Health Monitoring for FXML4 Production
apiVersion: v1
kind: ConfigMap
metadata:
  name: fxml4-health-monitoring-config
  namespace: fxml4
  labels:
    app: ftml4-health-monitoring
    component: monitoring
data:
  monitoring-script.sh: |
    #!/bin/bash
    set -e

    echo "=== FXML4 Production Health Monitoring ==="
    echo "Timestamp: $(date)"
    echo "Namespace: fxml4"
    echo

    # Color codes for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    # Health status tracking
    HEALTH_SCORE=0
    MAX_SCORE=0

    check_component() {
        local component=$1
        local status=$2
        local message=$3

        MAX_SCORE=$((MAX_SCORE + 1))

        if [ "$status" = "OK" ]; then
            echo -e "${GREEN}✓${NC} $component: $message"
            HEALTH_SCORE=$((HEALTH_SCORE + 1))
        elif [ "$status" = "WARN" ]; then
            echo -e "${YELLOW}⚠${NC} $component: $message"
        else
            echo -e "${RED}✗${NC} $component: $message"
        fi
    }

    # 1. External Database Health
    echo "1. Checking External Database (TimescaleDB)..."
    if pg_isready -h "$FXML4_DATABASE_HOST" -p "$FXML4_DATABASE_PORT" -U "$FXML4_DATABASE_USER" -d "$FXML4_DATABASE_NAME"; then
        # Check connection count
        CONNECTION_COUNT=$(psql -h "$FXML4_DATABASE_HOST" -p "$FXML4_DATABASE_PORT" -U "$FXML4_DATABASE_USER" -d "$FXML4_DATABASE_NAME" -t -c "SELECT count(*) FROM pg_stat_activity WHERE state = 'active';" | tr -d ' ')

        if [ "$CONNECTION_COUNT" -lt 50 ]; then
            check_component "Database" "OK" "Connected, $CONNECTION_COUNT active connections"
        elif [ "$CONNECTION_COUNT" -lt 80 ]; then
            check_component "Database" "WARN" "Connected, HIGH connection count: $CONNECTION_COUNT"
        else
            check_component "Database" "ERROR" "Connected, CRITICAL connection count: $CONNECTION_COUNT"
        fi

        # Check database size
        DB_SIZE_MB=$(psql -h "$FXML4_DATABASE_HOST" -p "$FXML4_DATABASE_PORT" -U "$FXML4_DATABASE_USER" -d "$FXML4_DATABASE_NAME" -t -c "SELECT pg_database_size('$FXML4_DATABASE_NAME')/1024/1024;" | tr -d ' ')
        if [ "$DB_SIZE_MB" -lt 10000 ]; then  # Less than 10GB
            check_component "Database Size" "OK" "${DB_SIZE_MB}MB"
        else
            check_component "Database Size" "WARN" "${DB_SIZE_MB}MB (Large)"
        fi

        # Check TimescaleDB extensions
        TIMESCALE_VERSION=$(psql -h "$FXML4_DATABASE_HOST" -p "$FXML4_DATABASE_PORT" -U "$FXML4_DATABASE_USER" -d "$FXML4_DATABASE_NAME" -t -c "SELECT extversion FROM pg_extension WHERE extname='timescaledb';" | tr -d ' ')
        if [ -n "$TIMESCALE_VERSION" ]; then
            check_component "TimescaleDB" "OK" "Version $TIMESCALE_VERSION"
        else
            check_component "TimescaleDB" "ERROR" "Extension not found"
        fi

    else
        check_component "Database" "ERROR" "Connection failed to $FXML4_DATABASE_HOST:$FXML4_DATABASE_PORT"
    fi
    echo

    # 2. Kubernetes Cluster Health
    echo "2. Checking Kubernetes Cluster..."

    # Check namespace
    if kubectl get namespace fxml4 > /dev/null 2>&1; then
        check_component "Namespace" "OK" "fxml4 namespace exists"
    else
        check_component "Namespace" "ERROR" "fxml4 namespace not found"
    fi

    # Check API deployment
    API_READY=$(kubectl get deployment fxml4-api -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
    API_DESIRED=$(kubectl get deployment fxml4-api -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")

    if [ "$API_READY" = "$API_DESIRED" ] && [ "$API_READY" -gt 0 ]; then
        check_component "API Deployment" "OK" "$API_READY/$API_DESIRED pods ready"
    elif [ "$API_READY" -gt 0 ]; then
        check_component "API Deployment" "WARN" "$API_READY/$API_DESIRED pods ready"
    else
        check_component "API Deployment" "ERROR" "No pods ready"
    fi

    # Check worker deployment
    WORKER_READY=$(kubectl get deployment fxml4-worker -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
    WORKER_DESIRED=$(kubectl get deployment fxml4-worker -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")

    if [ "$WORKER_READY" = "$WORKER_DESIRED" ] && [ "$WORKER_READY" -gt 0 ]; then
        check_component "Worker Deployment" "OK" "$WORKER_READY/$WORKER_DESIRED pods ready"
    elif [ "$WORKER_READY" -gt 0 ]; then
        check_component "Worker Deployment" "WARN" "$WORKER_READY/$WORKER_DESIRED pods ready"
    else
        check_component "Worker Deployment" "ERROR" "No pods ready"
    fi

    # Check services
    if kubectl get service fxml4-api > /dev/null 2>&1; then
        CLUSTER_IP=$(kubectl get service fxml4-api -o jsonpath='{.spec.clusterIP}')
        check_component "API Service" "OK" "ClusterIP: $CLUSTER_IP"
    else
        check_component "API Service" "ERROR" "Service not found"
    fi
    echo

    # 3. Application Health Checks
    echo "3. Checking Application Health..."

    # Get API pod for health checks
    API_POD=$(kubectl get pods -l app=fxml4-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

    if [ -n "$API_POD" ]; then
        # Health endpoint
        if kubectl exec "$API_POD" -- curl -sf http://localhost:8000/health > /dev/null 2>&1; then
            check_component "API Health Endpoint" "OK" "/health endpoint responding"
        else
            check_component "API Health Endpoint" "ERROR" "/health endpoint not responding"
        fi

        # Ready endpoint
        if kubectl exec "$API_POD" -- curl -sf http://localhost:8000/ready > /dev/null 2>&1; then
            check_component "API Ready Endpoint" "OK" "/ready endpoint responding"
        else
            check_component "API Ready Endpoint" "ERROR" "/ready endpoint not responding"
        fi

        # Database connectivity from pod
        if kubectl exec "$API_POD" -- python -c "
        import asyncio
        from fxml4.database.timescaledb import TimescaleDBManager
        async def check():
            db = TimescaleDBManager()
            await db.initialize()
            await db.cleanup()
        asyncio.run(check())
        " > /dev/null 2>&1; then
            check_component "Database Connectivity" "OK" "Application can connect to database"
        else
            check_component "Database Connectivity" "ERROR" "Application cannot connect to database"
        fi
    else
        check_component "API Pod" "ERROR" "No API pods found"
    fi
    echo

    # 4. External Dependencies
    echo "4. Checking External Dependencies..."

    # Redis health
    if kubectl exec deployment/redis -- redis-cli ping > /dev/null 2>&1; then
        check_component "Redis" "OK" "Redis responding to ping"
    else
        check_component "Redis" "ERROR" "Redis not responding"
    fi

    # RabbitMQ health
    if kubectl exec deployment/rabbitmq -- rabbitmq-diagnostics -q ping > /dev/null 2>&1; then
        check_component "RabbitMQ" "OK" "RabbitMQ responding"
    else
        check_component "RabbitMQ" "ERROR" "RabbitMQ not responding"
    fi

    # Check external API connectivity (Polygon.io)
    if [ -n "$POLYGON_API_KEY" ]; then
        if curl -sf "https://api.polygon.io/v1/meta/symbols/EURUSD/company?apikey=$POLYGON_API_KEY" > /dev/null; then
            check_component "Polygon API" "OK" "External API accessible"
        else
            check_component "Polygon API" "WARN" "External API not accessible"
        fi
    else
        check_component "Polygon API" "WARN" "API key not configured"
    fi
    echo

    # 5. Resource Usage
    echo "5. Checking Resource Usage..."

    # Node resource usage
    NODE_COUNT=$(kubectl get nodes --no-headers | wc -l)
    READY_NODES=$(kubectl get nodes --no-headers | grep -c Ready || echo "0")

    if [ "$READY_NODES" = "$NODE_COUNT" ]; then
        check_component "Cluster Nodes" "OK" "$READY_NODES/$NODE_COUNT nodes ready"
    else
        check_component "Cluster Nodes" "WARN" "$READY_NODES/$NODE_COUNT nodes ready"
    fi

    # Storage usage
    PVC_COUNT=$(kubectl get pvc --no-headers | wc -l)
    if [ "$PVC_COUNT" -gt 0 ]; then
        check_component "Persistent Storage" "OK" "$PVC_COUNT PVCs available"
    else
        check_component "Persistent Storage" "WARN" "No PVCs found"
    fi
    echo

    # 6. Security Checks
    echo "6. Checking Security..."

    # Secret existence
    if kubectl get secret fxml4-secrets > /dev/null 2>&1; then
        SECRET_KEYS=$(kubectl get secret fxml4-secrets -o jsonpath='{.data}' | jq -r 'keys[]' | wc -l)
        check_component "Application Secrets" "OK" "$SECRET_KEYS secret keys configured"
    else
        check_component "Application Secrets" "ERROR" "Secrets not found"
    fi

    # Network policies
    if kubectl get networkpolicy > /dev/null 2>&1; then
        NP_COUNT=$(kubectl get networkpolicy --no-headers | wc -l)
        if [ "$NP_COUNT" -gt 0 ]; then
            check_component "Network Policies" "OK" "$NP_COUNT policies active"
        else
            check_component "Network Policies" "WARN" "No network policies found"
        fi
    else
        check_component "Network Policies" "WARN" "NetworkPolicy API not available"
    fi
    echo

    # 7. Recent Events and Logs
    echo "7. Checking Recent Events..."

    WARNING_EVENTS=$(kubectl get events --field-selector type=Warning --no-headers | wc -l)
    if [ "$WARNING_EVENTS" -eq 0 ]; then
        check_component "Cluster Events" "OK" "No warning events"
    else
        check_component "Cluster Events" "WARN" "$WARNING_EVENTS warning events found"
        echo "Recent warning events:"
        kubectl get events --field-selector type=Warning --sort-by='.lastTimestamp' | tail -5
    fi
    echo

    # Final Health Score
    echo "=== HEALTH SUMMARY ==="
    HEALTH_PERCENTAGE=$(( HEALTH_SCORE * 100 / MAX_SCORE ))

    if [ "$HEALTH_PERCENTAGE" -ge 90 ]; then
        echo -e "${GREEN}✓ SYSTEM HEALTHY${NC} - Score: $HEALTH_SCORE/$MAX_SCORE ($HEALTH_PERCENTAGE%)"
        exit 0
    elif [ "$HEALTH_PERCENTAGE" -ge 70 ]; then
        echo -e "${YELLOW}⚠ SYSTEM DEGRADED${NC} - Score: $HEALTH_SCORE/$MAX_SCORE ($HEALTH_PERCENTAGE%)"
        exit 1
    else
        echo -e "${RED}✗ SYSTEM UNHEALTHY${NC} - Score: $HEALTH_SCORE/$MAX_SCORE ($HEALTH_PERCENTAGE%)"
        exit 2
    fi

---
# Health Monitoring CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fxml4-system-health-monitor
  namespace: fxml4
  labels:
    app: fxml4-system-health
    component: monitoring
spec:
  schedule: "*/10 * * * *" # Every 10 minutes
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      completions: 1
      template:
        metadata:
          labels:
            app: fxml4-system-health
            component: monitoring
        spec:
          restartPolicy: OnFailure
          serviceAccountName: fxml4-monitoring-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
            - name: health-monitor
              image: postgres:16-alpine
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - sh
                - -c
                - |
                  # Install additional dependencies
                  apk add --no-cache curl jq

                  # Run health monitoring script
                  /scripts/monitoring-script.sh
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: fxml4-secrets
                      key: database-password
              envFrom:
                - configMapRef:
                    name: fxml4-config
                - secretRef:
                    name: fxml4-secrets
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
              volumeMounts:
                - name: monitoring-scripts
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: monitoring-scripts
              configMap:
                name: fxml4-health-monitoring-config
                defaultMode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: 100Mi

---
# ServiceAccount for monitoring
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fxml4-monitoring-sa
  namespace: fxml4
  labels:
    app: fxml4-monitoring
    component: security

---
# Role for monitoring operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: fxml4
  name: fxml4-monitoring-role
rules:
  - apiGroups: [""]
    resources:
      [
        "pods",
        "services",
        "endpoints",
        "persistentvolumeclaims",
        "events",
        "secrets",
        "configmaps",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]

---
# RoleBinding for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fxml4-monitoring-binding
  namespace: fxml4
subjects:
  - kind: ServiceAccount
    name: fxml4-monitoring-sa
    namespace: fxml4
roleRef:
  kind: Role
  name: fxml4-monitoring-role
  apiGroup: rbac.authorization.k8s.io
