apiVersion: v1
kind: Secret
metadata:
  name: fxml4-secrets
  namespace: fxml4
type: Opaque
stringData:
  # SECURITY WARNING: This file contains placeholder values only
  # For production deployment:
  # 1. Use external secret management (Vault, K8s External Secrets, etc.)
  # 2. Never commit actual secrets to Git
  # 3. Replace all placeholder values with secure generated values

  # Database - MUST be replaced with secure password
  database-url: "postgresql://fxml4:${DB_PASSWORD}@timescaledb:5432/fxml4_db"
  database-password: "${DB_PASSWORD}"

  # RabbitMQ - MUST be replaced with secure password
  rabbitmq-url: "amqp://fxml4:${RABBITMQ_PASSWORD}@rabbitmq:5672"
  rabbitmq-password: "${RABBITMQ_PASSWORD}"

  # Redis - MUST be secured with password
  redis-url: "redis://:${REDIS_PASSWORD}@redis:6379"
  redis-password: "${REDIS_PASSWORD}"

  # API Keys - REQUIRED for production
  openai-api-key: "${OPENAI_API_KEY}"
  anthropic-api-key: "${ANTHROPIC_API_KEY}"
  polygon-api-key: "${POLYGON_API_KEY}"
  alpha-vantage-api-key: "${ALPHA_VANTAGE_API_KEY}"
  fred-api-key: "${FRED_API_KEY}"

  # Interactive Brokers - REQUIRED for live trading
  ib-gateway-host: "${IB_HOST}"
  ib-gateway-port: "${IB_PORT}"
  ib-client-id: "${IB_CLIENT_ID}"
  ib-account-id: "${IB_ACCOUNT_ID}"

  # Pinecone - OPTIONAL
  pinecone-api-key: "${PINECONE_API_KEY}"
  pinecone-environment: "${PINECONE_ENVIRONMENT}"

  # Security
  jwt-secret-key: "${FXML4_JWT_SECRET_KEY}"
  data-encryption-key: "${DATA_ENCRYPTION_KEY}"
