# FXML4 Production Secrets Template
# 
# IMPORTANT: This is a template file. In production, use proper secret management:
# 1. Use Kubernetes Secrets with proper RBAC
# 2. Use external secret management (HashiCorp Vault, AWS Secrets Manager, etc.)
# 3. Enable encryption at rest for etcd
# 4. Use sealed-secrets or external-secrets operator
#
# To create secrets from this template:
# kubectl create secret generic fxml4-api-secrets --from-env-file=secrets.env
#
apiVersion: v1
kind: Secret
metadata:
  name: fxml4-api-secrets
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: secrets
    environment: production
type: Opaque
data:
  # Database Credentials (base64 encoded)
  # Example: echo -n "production_user" | base64
  DATABASE_USER: cHJvZHVjdGlvbl91c2Vy  # production_user
  DATABASE_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  
  # JWT Secrets
  JWT_SECRET_KEY: <BASE64_ENCODED_JWT_SECRET>
  JWT_REFRESH_SECRET: <BASE64_ENCODED_JWT_REFRESH_SECRET>
  
  # Encryption Keys
  ENCRYPTION_KEY: <BASE64_ENCODED_ENCRYPTION_KEY>
  
  # External API Keys
  ALPHAVANTAGE_API_KEY: <BASE64_ENCODED_ALPHAVANTAGE_KEY>
  POLYGON_API_KEY: <BASE64_ENCODED_POLYGON_KEY>
  OPENAI_API_KEY: <BASE64_ENCODED_OPENAI_KEY>
  ANTHROPIC_API_KEY: <BASE64_ENCODED_ANTHROPIC_KEY>
  
  # Broker Credentials
  IB_USERNAME: <BASE64_ENCODED_IB_USERNAME>
  IB_PASSWORD: <BASE64_ENCODED_IB_PASSWORD>
  FXCM_API_KEY: <BASE64_ENCODED_FXCM_API_KEY>
  FXCM_SECRET_KEY: <BASE64_ENCODED_FXCM_SECRET_KEY>
  
  # Message Queue Credentials
  RABBITMQ_USERNAME: <BASE64_ENCODED_RABBITMQ_USER>
  RABBITMQ_PASSWORD: <BASE64_ENCODED_RABBITMQ_PASS>
  
  # Redis Password
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>
  
---
apiVersion: v1
kind: Secret
metadata:
  name: fxml4-tls-secret
  namespace: fxml4-production
  labels:
    app: fxml4
    component: tls
    environment: production
type: kubernetes.io/tls
data:
  # TLS Certificate and Key for HTTPS termination
  # Generated using cert-manager or external CA
  tls.crt: <BASE64_ENCODED_TLS_CERTIFICATE>
  tls.key: <BASE64_ENCODED_TLS_PRIVATE_KEY>
  
---
# Secret for pulling images from private registry
apiVersion: v1
kind: Secret
metadata:
  name: fxml4-registry-secret
  namespace: fxml4-production
  labels:
    app: fxml4
    component: registry
    environment: production
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>

---
# External Secrets Operator Configuration (Recommended for Production)
# This shows how to integrate with external secret management systems
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: fxml4-secret-store
  namespace: fxml4-production
spec:
  provider:
    vault:
      server: "https://vault.internal.company.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "fxml4-production"
          
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fxml4-external-secrets
  namespace: fxml4-production
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: fxml4-secret-store
    kind: SecretStore
  target:
    name: fxml4-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: fxml4/database
        property: password
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: fxml4/auth
        property: jwt_secret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: fxml4/external_apis
        property: openai_key