apiVersion: v1
kind: Service
metadata:
  name: fxml4-api
  namespace: fxml4
  labels:
    app: fxml4-api
    component: api
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: fxml4-api
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: fxml4-api-external
  namespace: fxml4
  labels:
    app: fxml4-api
    component: api
spec:
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: fxml4-api
  type: LoadBalancer
