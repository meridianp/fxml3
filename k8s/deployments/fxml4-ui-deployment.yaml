apiVersion: apps/v1
kind: Deployment
metadata:
  name: fxml4-ui
  namespace: fxml4-production
  labels:
    app: fxml4-ui
    component: frontend
    environment: production
    version: v1.0.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "FXML4 Trading UI - Production Frontend"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fxml4-ui
      component: frontend
      environment: production
  template:
    metadata:
      labels:
        app: fxml4-ui
        component: frontend
        environment: production
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/api/metrics"
        config.hash: "{{ configmap_hash }}"
    spec:
      serviceAccountName: fxml4-ui-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: fxml4-ui
        image: ghcr.io/fxml4/fxml4-ui:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: metrics
          containerPort: 3001
          protocol: TCP
        env:
        # Next.js Configuration
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: PORT
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXT_PUBLIC_API_URL
        - name: NEXT_PUBLIC_WS_URL
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXT_PUBLIC_WS_URL
        - name: NEXTAUTH_URL
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXTAUTH_URL
        
        # Feature Flags
        - name: NEXT_PUBLIC_TRADING_ENABLED
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXT_PUBLIC_TRADING_ENABLED
        - name: NEXT_PUBLIC_COMPLIANCE_MODULE
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXT_PUBLIC_COMPLIANCE_MODULE
        - name: NEXT_PUBLIC_RISK_MODULE
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXT_PUBLIC_RISK_MODULE
        - name: NEXT_PUBLIC_ANALYTICS_MODULE
          valueFrom:
            configMapKeyRef:
              name: fxml4-ui-config
              key: NEXT_PUBLIC_ANALYTICS_MODULE
        
        # Authentication Secrets
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: JWT_SECRET_KEY
        
        # Resource Management
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 10
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        
        # Volume Mounts
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: nextjs-cache
          mountPath: /app/.next
      
      # Volumes
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: nextjs-cache
        emptyDir: {}
      
      # Pod Anti-Affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - fxml4-ui
              topologyKey: kubernetes.io/hostname
      
      # Image Pull Secrets
      imagePullSecrets:
      - name: fxml4-registry-secret
      
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# WebSocket Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fxml4-websocket
  namespace: fxml4-production
  labels:
    app: fxml4-websocket
    component: websocket
    environment: production
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fxml4-websocket
      component: websocket
      environment: production
  template:
    metadata:
      labels:
        app: fxml4-websocket
        component: websocket
        environment: production
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fxml4-websocket-sa
      containers:
      - name: fxml4-websocket
        image: ghcr.io/fxml4/fxml4-websocket:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: websocket
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9091
          protocol: TCP
        env:
        - name: WS_PORT
          value: "8080"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: REDIS_HOST
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: RABBITMQ_HOST
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: REDIS_PASSWORD
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: RABBITMQ_PASSWORD
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL
      
      imagePullSecrets:
      - name: fxml4-registry-secret

---
# HPA for UI
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fxml4-ui-hpa
  namespace: fxml4-production
  labels:
    app: fxml4-ui
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fxml4-ui
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Service Accounts
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fxml4-ui-sa
  namespace: fxml4-production
  labels:
    app: fxml4-ui
    component: rbac
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fxml4-websocket-sa
  namespace: fxml4-production
  labels:
    app: fxml4-websocket
    component: rbac
automountServiceAccountToken: false