name: Build and Deploy

on:
  push:
    branches: [main, develop, feature/llm-analysis-enhanced]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Install and run pre-commit
        run: |
          pre-commit install
          pre-commit run --all-files || echo "Code quality issues found - continuing with deployment"

      - name: Run tests
        env:
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
          FXML4_DATABASE_URL: "sqlite:///:memory:"
        run: |
          # Run tests with proper configuration
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest tests/ -v --cov=fxml4 --cov-report=xml --cov-report=term --cov-fail-under=60 -m "not slow and not requires_ib"

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, dashboard, worker, training]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/fxml4-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}

  build-infrastructure:
    needs: test
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push TimescaleDB image
        uses: docker/build-push-action@v5
        with:
          context: ./infrastructure/docker
          file: ./infrastructure/docker/Dockerfile.timescaledb
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/fxml4-timescaledb:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build, build-infrastructure]
    runs-on: self-hosted
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --docker-email=${{ github.actor }}@users.noreply.github.com \
            --namespace=fxml4 \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create application secrets
        run: |
          # Apply namespace first
          kubectl apply -f k8s/namespace/namespace.yaml

          # Create app secrets from GitHub secrets
          export DB_HOST="${{ secrets.DB_HOST }}"
          export DB_PORT="${{ secrets.DB_PORT }}"
          export DB_USER="${{ secrets.DB_USER }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export DB_NAME="${{ secrets.DB_NAME }}"
          export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
          export RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}"
          export GRAFANA_PASSWORD="${{ secrets.GRAFANA_PASSWORD }}"
          export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          export ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          export POLYGON_API_KEY="${{ secrets.POLYGON_API_KEY }}"
          export ALPHA_VANTAGE_API_KEY="${{ secrets.ALPHA_VANTAGE_API_KEY }}"
          export FRED_API_KEY="${{ secrets.FRED_API_KEY }}"
          export IB_GATEWAY_HOST="${{ secrets.IB_GATEWAY_HOST }}"
          export IB_GATEWAY_PORT="${{ secrets.IB_GATEWAY_PORT }}"
          export IB_CLIENT_ID="${{ secrets.IB_CLIENT_ID }}"
          export PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}"
          export PINECONE_ENVIRONMENT="${{ secrets.PINECONE_ENVIRONMENT }}"

          # Apply secrets template with substitution
          envsubst < k8s/secrets/app-secrets-template.yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          # Update image tags in manifests
          export IMAGE_TAG="${{ github.sha }}"
          envsubst < k8s/deployments/api.yaml | kubectl apply -f -
          envsubst < k8s/deployments/dashboard.yaml | kubectl apply -f -
          envsubst < k8s/deployments/worker.yaml | kubectl apply -f -

          # Wait for rollout
          kubectl rollout status deployment/fxml4-api -n fxml4
          kubectl rollout status deployment/fxml4-dashboard -n fxml4
          kubectl rollout status deployment/fxml4-worker -n fxml4

      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          sleep 30

          # Get service endpoints
          API_URL=$(kubectl get svc fxml4-api -n fxml4 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          # Basic health check
          curl -f http://${API_URL}:8000/health || exit 1

  notify:
    needs: [deploy]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }} for ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
