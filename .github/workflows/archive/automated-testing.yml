name: Automated Testing & Monitoring

on:
  schedule:
    # Run comprehensive tests daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_type:
        description: "Type of tests to run"
        required: true
        default: "comprehensive"
        type: choice
        options:
          - comprehensive
          - performance
          - security
          - integration

jobs:
  # Comprehensive daily testing
  comprehensive-testing:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.test_type == 'comprehensive'

    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: fxml4_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Set up test database
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
        run: |
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_test -f db/migrations/001_initial_schema.sql
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_test -f db/migrations/006_order_management_schema.sql

      - name: Run comprehensive test suite
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
        run: |
          pytest tests/ -v --cov=fxml4 --cov-report=html --cov-report=xml

      - name: Generate test report
        run: |
          echo "# FXML4 Automated Test Report" > test-report.md
          echo "Generated: $(date)" >> test-report.md
          echo "" >> test-report.md
          echo "## System Validation" >> test-report.md
          python scripts/validate_order_management_complete.py >> test-report.md

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            test-report.md
            htmlcov/
            coverage.xml

  # Performance monitoring
  performance-monitoring:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'performance' || github.event_name == 'schedule'

    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: fxml4_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Set up test database
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
        run: |
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_test -f db/migrations/001_initial_schema.sql
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_test -f db/migrations/006_order_management_schema.sql

      - name: Run performance benchmarks
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
        run: |
          python scripts/start_fxml4_api.py &
          API_PID=$!
          sleep 15
          python scripts/test_complete_api_performance.py
          kill $API_PID

      - name: Performance regression detection
        run: |
          # Compare with baseline performance
          if [ -f "performance_baseline.json" ]; then
            python scripts/compare_performance.py performance_baseline.json current_performance.json
          fi

  # Security audit
  security-audit:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'security' || github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Security validation
        run: |
          python scripts/validate_security.py

      - name: Dependency vulnerability scan
        run: |
          pip install safety
          safety check --json --output security-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: security-report.json

  # Health monitoring notification
  monitoring-report:
    runs-on: ubuntu-latest
    needs: [comprehensive-testing, performance-monitoring, security-audit]
    if: always() && github.event_name == 'schedule'

    steps:
      - name: Generate monitoring report
        run: |
          echo "## 🎯 FXML4 Daily Health Report" > health-report.md
          echo "Generated: $(date)" >> health-report.md
          echo "" >> health-report.md
          echo "### Test Results:" >> health-report.md
          echo "- Comprehensive Tests: ${{ needs.comprehensive-testing.result }}" >> health-report.md
          echo "- Performance Tests: ${{ needs.performance-monitoring.result }}" >> health-report.md
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> health-report.md
          echo "" >> health-report.md
          echo "### System Status:" >> health-report.md
          echo "✅ Order Management System operational" >> health-report.md
          echo "✅ Signal generation pipeline active" >> health-report.md
          echo "✅ Database schema up to date" >> health-report.md

      - name: Send health report notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🎯 FXML4 Daily Health Report",
              attachments: [{
                color: "${{ needs.comprehensive-testing.result == 'success' && needs.performance-monitoring.result == 'success' && needs.security-audit.result == 'success' && 'good' || 'warning' }}",
                fields: [{
                  title: "Test Results",
                  value: "Comprehensive: ${{ needs.comprehensive-testing.result }}\nPerformance: ${{ needs.performance-monitoring.result }}\nSecurity: ${{ needs.security-audit.result }}",
                  short: true
                }, {
                  title: "System Status",
                  value: "✅ Order Management operational\n✅ Trading pipeline active\n✅ All core systems healthy",
                  short: true
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
