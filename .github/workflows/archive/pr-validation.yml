name: PR Validation

on:
  pull_request:
    branches: [main, develop]

jobs:
  # Fast validation for PRs
  pr-validation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: fxml4_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Install pre-commit
        run: |
          pre-commit install

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files || echo "::warning::Code quality issues found - please run pre-commit locally to fix"

      - name: Set up test database
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
        run: |
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_test -f db/migrations/001_initial_schema.sql
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_test -f db/migrations/006_order_management_schema.sql

      - name: Run fast tests
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
        run: |
          pytest tests/ -m "not slow and not requires_ib and not requires_fxcm" -v --maxfail=5

      - name: Validate Order Management
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
        run: |
          python scripts/validate_order_management_complete.py

      - name: API smoke test
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
        run: |
          python scripts/start_fxml4_api.py &
          API_PID=$!
          sleep 15
          curl -f http://localhost:8001/health || exit 1
          kill $API_PID

      - name: Comment PR with status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('🎯 FXML4 PR Validation')
            );

            const status = '${{ job.status }}' === 'success' ? '✅ PASSED' : '❌ FAILED';
            const body = `## 🎯 FXML4 PR Validation Results

            **Status:** ${status}

            ### Validation Summary:
            - Code Quality Checks: ${{ steps.code-quality.outcome || 'Skipped' }}
            - Database Tests: ${{ steps.database-tests.outcome || 'Skipped' }}
            - Order Management: ${{ steps.order-management.outcome || 'Skipped' }}
            - API Smoke Test: ${{ steps.api-test.outcome || 'Skipped' }}

            **Ready for merge:** ${status === '✅ PASSED' ? 'Yes' : 'No - Please fix issues'}

            <sub>Generated by FXML4 CI/CD Pipeline</sub>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
