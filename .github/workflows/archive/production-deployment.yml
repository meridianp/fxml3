name: Production Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Production readiness validation
  production-validation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: fxml4_prod_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Set up production test database
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_prod_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
        run: |
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_prod_test -f db/migrations/001_initial_schema.sql
          PGPASSWORD=postgres  # pragma: allowlist secret psql -h localhost -p 5432 -U postgres -d fxml4_prod_test -f db/migrations/006_order_management_schema.sql

      - name: Run complete system validation
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_prod_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
        run: |
          python scripts/validate_order_management_complete.py
          python scripts/validate_architecture.py
          python scripts/validate_security.py

      - name: Performance benchmarking
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5432
          FXML4_DATABASE_NAME: fxml4_prod_test
          FXML4_DATABASE_USER: postgres
          FXML4_DATABASE_PASSWORD: postgres # pragma: allowlist secret
          FXML4_JWT_SECRET_KEY: test-secret-key-32-chars-long # pragma: allowlist secret
        run: |
          python scripts/start_fxml4_api.py &
          API_PID=$!
          sleep 15
          python scripts/test_complete_api_performance.py
          kill $API_PID

  # Build production images
  build-production:
    runs-on: ubuntu-latest
    needs: [production-validation]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
          build-args: |
            ENVIRONMENT=production

      - name: Build and push production worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/worker.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest
          build-args: |
            ENVIRONMENT=production

  # Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-production]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://api.fxml4.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubectl for production
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Deploy to production
        run: |
          kubectl apply -f k8s/namespace/production.yaml
          kubectl apply -f k8s/secrets/production-secrets.yaml
          kubectl apply -f k8s/deployments/production/

      - name: Rolling deployment with zero downtime
        run: |
          kubectl set image deployment/fxml4-api fxml4-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.ref_name }} -n production
          kubectl set image deployment/fxml4-worker fxml4-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ github.ref_name }} -n production
          kubectl rollout status deployment/fxml4-api -n production --timeout=600s
          kubectl rollout status deployment/fxml4-worker -n production --timeout=300s

      - name: Production health verification
        run: |
          sleep 30
          kubectl get pods -n production
          kubectl logs -l app=fxml4-api -n production --tail=20

          # Test production endpoint
          curl -f https://api.fxml4.com/health || exit 1

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: success
          text: "🎯 FXML4 Production Deployment SUCCESS - Version ${{ github.ref_name }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: failure
          text: "❌ FXML4 Production Deployment FAILED - Version ${{ github.ref_name }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
