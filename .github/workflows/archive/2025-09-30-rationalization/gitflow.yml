name: GitFlow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # Validate branch naming and workflow compliance
  validate-gitflow:
    name: 🔍 Validate GitFlow Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming
        run: |
          branch_name="${{ github.head_ref }}"
          echo "Checking branch name: $branch_name"

          # Define valid patterns
          if [[ "$branch_name" =~ ^(feature|bugfix|release|hotfix)/.+ ]] ||
             [[ "$branch_name" == "main" ]] ||
             [[ "$branch_name" == "develop" ]]; then
            echo "✅ Branch name follows GitFlow convention"
          else
            echo "❌ Branch name does not follow GitFlow convention"
            echo "Expected: feature/*, bugfix/*, release/*, hotfix/*, main, or develop"
            exit 1
          fi

      - name: Validate target branch
        run: |
          base_branch="${{ github.base_ref }}"
          head_branch="${{ github.head_ref }}"

          echo "PR from $head_branch to $base_branch"

          # Validate merge targets according to GitFlow
          case $head_branch in
            feature/*|bugfix/*)
              if [[ "$base_branch" != "develop" ]]; then
                echo "❌ Features and bugfixes should target 'develop' branch"
                exit 1
              fi
              ;;
            release/*)
              if [[ "$base_branch" != "main" ]]; then
                echo "❌ Release branches should target 'main' branch"
                exit 1
              fi
              ;;
            hotfix/*)
              if [[ "$base_branch" != "main" ]]; then
                echo "❌ Hotfix branches should target 'main' branch"
                exit 1
              fi
              ;;
          esac
          echo "✅ Target branch is valid for GitFlow"

  # Comprehensive testing pipeline
  test-suite:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
          POSTGRES_DB: fxml4_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements/development.txt

      - name: Install Node.js dependencies
        run: npm ci

      - name: Lint Python code
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Format check Python code
        run: black --check --diff .

      - name: Type check Python code
        run: mypy core/ --ignore-missing-imports

      - name: Run Python tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fxml4_test  # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379
          TEST_TYPE: ${{ matrix.test-type }}
        run: |
          if [ "${{ matrix.test-type }}" == "unit" ]; then
            pytest tests/unit/ -v --cov=core --cov-report=xml --cov-report=term-missing
          elif [ "${{ matrix.test-type }}" == "integration" ]; then
            pytest tests/integration/ -v --cov=core --cov-report=xml --cov-report=term-missing
          fi

      - name: Run JavaScript/TypeScript tests
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: ${{ matrix.test-type }}
          name: codecov-${{ matrix.test-type }}

  # Security and quality checks
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security check
        run: |
          pip install bandit[toml]
          bandit -r core/ -f json -o bandit-report.json || true
          bandit -r core/

      - name: Run Safety check for Python dependencies
        run: |
          pip install safety
          safety check --json --output safety-report.json || true
          safety check

      - name: Audit Node.js dependencies
        run: npm audit --audit-level=moderate

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: python, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # Performance and load testing (for critical branches)
  performance-test:
    name: ⚡ Performance Test
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-benchmark

      - name: Run performance tests
        run: pytest tests/performance/ -v --benchmark-json=benchmark.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true

  # Build and deployment preparation
  build-and-package:
    name: 📦 Build & Package
    runs-on: ubuntu-latest
    needs: [test-suite, security-scan]
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Build Docker image
        run: |
          docker build -t fxml4:${{ github.sha }} .
          docker tag fxml4:${{ github.sha }} fxml4:latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            dist/
            frontend/build/
          retention-days: 30

  # Deployment (only for main and release branches)
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate-gitflow, test-suite, security-scan, build-and-package]
    if: |
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/release/')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts-${{ github.sha }}

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          # Add actual deployment steps here

  deploy-production:
    name: 🎯 Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate-gitflow, test-suite, security-scan, build-and-package]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts-${{ github.sha }}

      - name: Create release
        if: startsWith(github.event.head_commit.message, 'release:')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Deploy to production
        run: |
          echo "🎯 Deploying to production environment..."
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          # Add actual deployment steps here

  # Notification and reporting
  notify-team:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ Production deployment successful!"
            # Add notification logic (Slack, email, etc.)
          elif [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ Staging deployment successful!"
            # Add notification logic
          else
            echo "❌ Deployment failed or skipped"
            # Add failure notification logic
          fi
