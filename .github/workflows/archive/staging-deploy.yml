name: FXML4 Staging Deployment

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - development

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/fxml4-api
  IMAGE_NAME_UI: ${{ github.repository }}/fxml4-ui
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # Fast feedback loop for staging
  test-fast:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: fxml4_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run fast tests
        run: |
          export DATABASE_URL="postgresql://test_user:test_password@localhost:5432/fxml4_test"
          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}"
          pytest tests/ -v -m "not slow and not requires_ib and not requires_fxcm" --maxfail=10

  # Build staging images
  build-staging:
    runs-on: ubuntu-latest
    needs: test-fast
    outputs:
      api-image: ${{ steps.build-api.outputs.image }}
      ui-image: ${{ steps.build-ui.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        id: build-api
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:staging-${{ github.sha }}"
          docker buildx build --platform linux/amd64 -t $IMAGE_TAG -f Dockerfile.api --push .
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build UI image
        id: build-ui
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:staging-${{ github.sha }}"
          docker buildx build --platform linux/amd64 -t $IMAGE_TAG -f fxml4-ui/Dockerfile \
            --build-arg NODE_ENV=staging \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.STAGING_WS_URL }} \
            --push ./fxml4-ui/
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # Deploy to staging environment
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-staging
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.fxml4.trading
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubectl for staging
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to staging
        run: |
          # Create staging namespace if it doesn't exist
          kubectl create namespace fxml4-staging --dry-run=client -o yaml | kubectl apply -f -

          # Apply staging configurations
          envsubst < k8s/deployments/fxml4-api-deployment.yaml | kubectl apply -f - -n fxml4-staging
          envsubst < k8s/deployments/fxml4-ui-deployment.yaml | kubectl apply -f - -n fxml4-staging
          envsubst < k8s/services/fxml4-services.yaml | kubectl apply -f - -n fxml4-staging
        env:
          API_IMAGE: ${{ needs.build-staging.outputs.api-image }}
          UI_IMAGE: ${{ needs.build-staging.outputs.ui-image }}
          ENVIRONMENT: staging

      - name: Wait for staging deployment
        run: |
          kubectl rollout status deployment/fxml4-api -n fxml4-staging --timeout=300s
          kubectl rollout status deployment/fxml4-ui -n fxml4-staging --timeout=300s

      - name: Run staging smoke tests
        run: |
          sleep 30  # Allow services to stabilize
          curl -f https://staging-api.fxml4.trading/health || echo "API health check failed"
          curl -f https://staging.fxml4.trading/api/health || echo "UI health check failed"

  # E2E tests on staging
  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: ./fxml4-ui
        run: |
          npm ci
          npx playwright install

      - name: Run E2E tests
        working-directory: ./fxml4-ui
        run: |
          npx playwright test --config=playwright.config.staging.ts
        env:
          STAGING_URL: https://staging.fxml4.trading
          TEST_USERNAME: ${{ secrets.STAGING_TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report-staging
          path: fxml4-ui/test-results/

  # Performance tests
  performance-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run load tests
        run: |
          # Install k6
          curl https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1

          # Run performance tests
          ./k6 run --vus 10 --duration 2m scripts/performance/api-load-test.js
        env:
          API_URL: https://staging-api.fxml4.trading
          AUTH_TOKEN: ${{ secrets.STAGING_API_TOKEN }}

      - name: Check performance thresholds
        run: |
          # Parse k6 results and check against thresholds
          echo "Performance test completed. Check logs for detailed results."

  # Security scan on staging
  security-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Run OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: "https://staging.fxml4.trading"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j -l WARN"

      - name: Upload ZAP results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-report
          path: report_html.html

  # Cleanup old staging deployments
  cleanup:
    runs-on: ubuntu-latest
    needs: [e2e-tests, performance-tests]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Clean up PR deployment
        run: |
          # Remove PR-specific resources if they exist
          kubectl delete namespace fxml4-pr-${{ github.event.number }} --ignore-not-found=true

  # Notification
  notify-staging:
    runs-on: ubuntu-latest
    needs: [deploy-staging, e2e-tests, performance-tests]
    if: always()
    steps:
      - name: Notify staging deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "🚀 FXML4 Staging deployment: ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
