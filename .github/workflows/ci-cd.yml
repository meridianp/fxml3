name: FXML4 Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: meridianp/fxml4

jobs:
  # Stage 1: Linting (Fastest - Fail Fast)
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.8.0 flake8==7.1.1 isort>=5.12.0 mypy>=1.3.0

      - name: Run Black (Code Formatting)
        run: black --check --diff .

      - name: Run isort (Import Sorting)
        run: isort --check-only --diff .

      - name: Run Flake8 (Linting)
        run: flake8 --max-line-length=88 --exclude=archive,fxml4_redesign,tests .

      - name: Run MyPy (Type Checking)
        run: mypy fxml4 --ignore-missing-imports
        continue-on-error: true

  # Stage 2: Unit Tests (Fast - Core Business Logic)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements-dev.txt', 'requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-test.txt
          pip install -e .

      - name: Run Unit Tests
        run: |
          pytest tests/ -m "unit and not slow and not requires_ib and not requires_fxcm" \
            -v --tb=short --maxfail=5 \
            --junit-xml=junit-unit.xml \
            --cov=fxml4 --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing --cov-fail-under=60

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            junit-unit.xml
            coverage-unit.xml

  # Stage 3: Integration Tests (Slower - External Dependencies)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: true

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: fxml4_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fxml4_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6380:6379

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: fxml4_test
          RABBITMQ_DEFAULT_PASS: test_password
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 30s
          --health-timeout 30s
          --health-retries 3
        ports:
          - 5673:5672
          - 15673:15672

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-integration-${{ hashFiles('requirements-dev.txt', 'requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-integration-
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-test.txt
          pip install -e .

      - name: Wait for services
        run: |
          timeout 60s bash -c 'until nc -z localhost 5433; do sleep 1; done'
          timeout 60s bash -c 'until nc -z localhost 6380; do sleep 1; done'
          timeout 60s bash -c 'until nc -z localhost 5673; do sleep 1; done'

      - name: Run Integration Tests
        env:
          FXML4_DATABASE_HOST: localhost
          FXML4_DATABASE_PORT: 5433
          FXML4_DATABASE_NAME: fxml4_test
          FXML4_DATABASE_USER: fxml4_test
          FXML4_DATABASE_PASSWORD: test_password
          FXML4_REDIS_HOST: localhost
          FXML4_REDIS_PORT: 6380
          FXML4_RABBITMQ_HOST: localhost
          FXML4_RABBITMQ_PORT: 5673
          FXML4_RABBITMQ_USER: fxml4_test
          FXML4_RABBITMQ_PASSWORD: test_password
        run: |
          pytest tests/ -m "integration and not requires_ib and not requires_fxcm" \
            -v --tb=short --maxfail=3 \
            --junit-xml=junit-integration.xml \
            --timeout=300

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml

  # Stage 4: Security & E2E Tests (Comprehensive)
  security-e2e-tests:
    name: Security & E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements-dev.txt', 'requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-test.txt
          pip install -e .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test containers
        run: |
          docker-compose -f docker-compose.test.yml build

      - name: Run Security Tests
        run: |
          pytest tests/ -m "security or auth" \
            -v --tb=short --maxfail=2 \
            --junit-xml=junit-security.xml

      - name: Run E2E Tests (Containerized)
        run: |
          if [ -f "scripts/run_e2e_auth_tests.sh" ]; then
            ./scripts/run_e2e_auth_tests.sh run
          else
            pytest tests/ -m "e2e" -v --tb=short --maxfail=1 --timeout=600 || true
          fi
        timeout-minutes: 15

      - name: Upload Security Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-e2e-test-results
          path: |
            junit-security.xml
            test-results/

      - name: Clean up containers
        if: always()
        run: |
          docker-compose -f docker-compose.test.yml down -v --remove-orphans || true

  # Stage 5: Build & Publish (Conditional)
  publish:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security-e2e-tests]
    if: always() && (needs.lint.result == 'success' && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.security-e2e-tests.result == 'success')

    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    strategy:
      matrix:
        service: [api, dashboard, worker, training]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 6: Deploy (Production - Main branch only)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          DOCKER_IMAGE_API: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
          DOCKER_IMAGE_DASHBOARD: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:latest
          DOCKER_IMAGE_WORKER: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest
          DOCKER_IMAGE_TRAINING: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-training:latest
        run: |
          echo "🚀 Deploying to production with images:"
          echo "  API: $DOCKER_IMAGE_API"
          echo "  Dashboard: $DOCKER_IMAGE_DASHBOARD"
          echo "  Worker: $DOCKER_IMAGE_WORKER"
          echo "  Training: $DOCKER_IMAGE_TRAINING"

          # Add your deployment logic here
          # Examples:
          # - Update Kubernetes deployments
          # - Update docker-compose on production server
          # - Trigger deployment webhook

          # For now, simulate deployment
          if [ -f "deploy-production.sh" ]; then
            ./deploy-production.sh
          else
            echo "✅ Production deployment completed (simulated)"
          fi

      - name: Post-deployment verification
        run: |
          echo "🔍 Running post-deployment verification..."
          # Add health checks, smoke tests, etc.
          echo "✅ Post-deployment verification completed"

  # Final: Summary Report
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security-e2e-tests, publish, deploy]
    if: always()

    steps:
      - name: Generate Pipeline Summary
        run: |
          echo "# FXML4 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Linting:** ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests:** ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Tests:** ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security & E2E Tests:** ${{ needs.security-e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build & Publish:** ${{ needs.publish.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
