# FXML4 CI Pipeline - Fast Feedback
# Purpose: Provide quick validation for all code changes
# Target: <8 minutes for standard PR validation
# Triggers: All PRs, push to feature branches

name: CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  COVERAGE_THRESHOLD: 80

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # STAGE 1: FAST CHECKS (Parallel) - Target: 2-3 minutes
  # =============================================================================

  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
          pip install -r requirements-dev.txt

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Run Black formatter check
        run: black --check --diff core/ api/ tests/ scripts/

      - name: Run isort import check
        run: isort --check-only --diff core/ api/ tests/ scripts/

      - name: Run Flake8 linter
        run: flake8 core/ api/ tests/ scripts/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run Mypy type checking
        run: mypy core api --ignore-missing-imports --no-strict-optional

      - name: Run ESLint (Frontend)
        working-directory: frontend
        run: npm run lint

      - name: Run Prettier check (Frontend)
        working-directory: frontend
        run: npm run format:check

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Run Bandit security linter
        run: |
          bandit -r core/ api/ -f json -o bandit-report.json
          bandit -r core/ api/ -f screen
        continue-on-error: true

      - name: Run Safety dependency checker
        run: safety check --json || true

      - name: Run pip-audit
        run: pip-audit --desc || true

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns
          ! grep -rn "password\s*=\s*['\"]" --include="*.py" core/ api/ || echo "⚠️  Found potential hardcoded passwords"
          ! grep -rn "api_key\s*=\s*['\"]" --include="*.py" core/ api/ || echo "⚠️  Found potential hardcoded API keys"
          ! grep -rn "secret\s*=\s*['\"]" --include="*.py" core/ api/ || echo "⚠️  Found potential hardcoded secrets"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30

  # =============================================================================
  # STAGE 2: UNIT TESTS (Parallel) - Target: 3-5 minutes
  # =============================================================================

  unit-tests-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [code-quality, security-scan]

    strategy:
      fail-fast: false
      matrix:
        test-group: [core, api, data_engineering, ml, risk]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run unit tests (${{ matrix.test-group }})
        run: |
          pytest tests/unit/${{ matrix.test-group }}/ \
            -v \
            --tb=short \
            --cov=core/${{ matrix.test-group }} \
            --cov=api \
            --cov-report=xml:coverage-${{ matrix.test-group }}.xml \
            --cov-report=term \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --maxfail=3

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.test-group }}
          path: coverage-${{ matrix.test-group }}.xml
          retention-days: 30

  unit-tests-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [code-quality, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Run Jest tests
        working-directory: frontend
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 30

  # =============================================================================
  # STAGE 3: BUILD VALIDATION - Target: 3-5 minutes
  # =============================================================================

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-tests-python, unit-tests-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build wheel

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Build Python package
        run: |
          python -m build
          ls -lh dist/

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
          ls -lh .next/

      - name: Validate package installation
        run: |
          pip install dist/*.whl
          python -c "import fxml4; from core.database.security import validate_table_name; print('✅ Package installation successful')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            frontend/.next/
          retention-days: 7

  # =============================================================================
  # STAGE 4: DOCKER BUILD (Only on main/develop)
  # =============================================================================

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-validation]
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          tags: fxml4/api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          push: false
          tags: fxml4/worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # FINAL: STATUS CHECK
  # =============================================================================

  ci-status:
    name: CI Pipeline Status
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, unit-tests-python, unit-tests-frontend, build-validation]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests-python.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests-frontend.result }}" != "success" ]] || \
             [[ "${{ needs.build-validation.result }}" != "success" ]]; then
            echo "❌ CI Pipeline failed"
            exit 1
          else
            echo "✅ CI Pipeline passed successfully"
          fi

      - name: Summary
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python Tests: ${{ needs.unit-tests-python.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Tests: ${{ needs.unit-tests-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Validation: ${{ needs.build-validation.result }}" >> $GITHUB_STEP_SUMMARY
