apiVersion: v1
kind: Service
metadata:
  name: fxml4-api
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: service
    environment: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: fxml4-api
    component: api
    environment: production

---
apiVersion: v1
kind: Service
metadata:
  name: fxml4-ui
  namespace: fxml4-production
  labels:
    app: fxml4-ui
    component: service
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3001"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 3001
    targetPort: 3001
    protocol: TCP
  selector:
    app: fxml4-ui
    component: frontend
    environment: production

---
apiVersion: v1
kind: Service
metadata:
  name: fxml4-websocket
  namespace: fxml4-production
  labels:
    app: fxml4-websocket
    component: service
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
  ports:
  - name: websocket
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9091
    targetPort: 9091
    protocol: TCP
  selector:
    app: fxml4-websocket
    component: websocket
    environment: production

---
# Headless service for StatefulSet workloads
apiVersion: v1
kind: Service
metadata:
  name: fxml4-api-headless
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: headless-service
    environment: production
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: fxml4-api
    component: api
    environment: production

---
# External service for load balancing (if using external LB)
apiVersion: v1
kind: Service
metadata:
  name: fxml4-external-lb
  namespace: fxml4-production
  labels:
    app: fxml4
    component: external-loadbalancer
    environment: production
  annotations:
    # AWS Load Balancer Controller annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "instance"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval-seconds: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout-seconds: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthy-threshold-count: "2"
    service.beta.kubernetes.io/aws-load-balancer-unhealthy-threshold-count: "3"
    # Certificate ARN for SSL termination
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
spec:
  type: LoadBalancer
  ports:
  - name: https
    port: 443
    targetPort: 80
    protocol: TCP
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: fxml4-api
    component: api
    environment: production

---
# Service Monitor for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fxml4-api-metrics
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: monitoring
    environment: production
spec:
  selector:
    matchLabels:
      app: fxml4-api
      component: service
      environment: production
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - fxml4-production

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fxml4-websocket-metrics
  namespace: fxml4-production
  labels:
    app: fxml4-websocket
    component: monitoring
    environment: production
spec:
  selector:
    matchLabels:
      app: fxml4-websocket
      component: service
      environment: production
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - fxml4-production

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fxml4-network-policy
  namespace: fxml4-production
  labels:
    app: fxml4
    component: security
    environment: production
spec:
  podSelector:
    matchLabels:
      environment: production
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 8080
  # Allow inter-pod communication within namespace
  - from:
    - podSelector:
        matchLabels:
          environment: production
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 8080
  # Allow monitoring scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: fxml4-monitoring
    ports:
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 9091
    - protocol: TCP
      port: 3001
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS outbound (external APIs)
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Allow database connections
  - to:
    - podSelector:
        matchLabels:
          app: timescaledb
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis connections
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow RabbitMQ connections
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672