apiVersion: v1
kind: Service
metadata:
  name: fxml4-dashboard
  namespace: fxml4
  labels:
    app: fxml4-dashboard
    component: ui
spec:
  ports:
    - port: 8501
      targetPort: 8501
      protocol: TCP
      name: http
  selector:
    app: fxml4-dashboard
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: fxml4-dashboard-external
  namespace: fxml4
  labels:
    app: fxml4-dashboard
    component: ui
spec:
  ports:
    - port: 80
      targetPort: 8501
      protocol: TCP
      name: http
  selector:
    app: fxml4-dashboard
  type: LoadBalancer
