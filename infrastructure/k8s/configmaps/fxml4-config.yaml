apiVersion: v1
kind: ConfigMap
metadata:
  name: fxml4-api-config
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: configuration
    environment: production
data:
  # API Configuration
  API_PORT: "8000"
  API_HOST: "0.0.0.0"
  API_WORKERS: "4"
  API_TIMEOUT: "60"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  
  # Database Configuration
  DATABASE_HOST: "timescaledb-primary"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "fxml4_production"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  DATABASE_POOL_TIMEOUT: "30"
  
  # Redis Configuration
  REDIS_HOST: "redis-cluster"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_CONNECTIONS: "100"
  
  # RabbitMQ Configuration
  RABBITMQ_HOST: "rabbitmq-cluster"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/fxml4"
  
  # Trading Configuration
  TRADING_ENABLED: "true"
  PAPER_TRADING: "false"
  MAX_POSITION_SIZE: "1000000"
  RISK_LIMIT_PERCENT: "2.0"
  
  # External APIs
  IB_GATEWAY_HOST: "ib-gateway"
  IB_GATEWAY_PORT: "7497"
  FXCM_API_ENV: "production"
  
  # Monitoring
  METRICS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  PROMETHEUS_PORT: "9090"
  
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fxml4-ui-config
  namespace: fxml4-production
  labels:
    app: fxml4-ui
    component: configuration
    environment: production
data:
  # Next.js Configuration
  NODE_ENV: "production"
  PORT: "3000"
  
  # API Endpoints
  NEXT_PUBLIC_API_URL: "https://api.fxml4.trading"
  NEXT_PUBLIC_WS_URL: "wss://ws.fxml4.trading"
  
  # Authentication
  NEXTAUTH_URL: "https://app.fxml4.trading"
  
  # Feature Flags
  NEXT_PUBLIC_TRADING_ENABLED: "true"
  NEXT_PUBLIC_COMPLIANCE_MODULE: "true"
  NEXT_PUBLIC_RISK_MODULE: "true"
  NEXT_PUBLIC_ANALYTICS_MODULE: "true"
  
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fxml4-monitoring-config
  namespace: fxml4-monitoring
  labels:
    app: monitoring
    component: configuration
data:
  # Prometheus Configuration
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093
    
    rule_files:
      - "alert_rules.yml"
    
    scrape_configs:
      - job_name: 'fxml4-api'
        static_configs:
          - targets: ['fxml4-api:9090']
        scrape_interval: 10s
        metrics_path: '/metrics'
        
      - job_name: 'fxml4-websocket'
        static_configs:
          - targets: ['fxml4-websocket:9091']
        scrape_interval: 10s
        
      - job_name: 'timescaledb'
        static_configs:
          - targets: ['timescaledb-primary:9187']
        scrape_interval: 30s
        
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-cluster:9121']
        scrape_interval: 30s
        
      - job_name: 'rabbitmq'
        static_configs:
          - targets: ['rabbitmq-cluster:15692']
        scrape_interval: 30s
        
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - fxml4-production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
  
  # Alert Rules
  alert_rules.yml: |
    groups:
      - name: fxml4_critical
        rules:
          - alert: FXML4APIDown
            expr: up{job="fxml4-api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "FXML4 API is down"
              description: "FXML4 API has been down for more than 1 minute"
              
          - alert: HighAPILatency
            expr: http_request_duration_seconds{quantile="0.95", job="fxml4-api"} > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High API latency detected"
              description: "95th percentile latency is above 2 seconds for 5 minutes"
              
          - alert: DatabaseConnectionHigh
            expr: database_connections_active / database_connections_max > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Database connection pool usage high"
              description: "Database connection usage is above 80% for 5 minutes"
              
          - alert: TradingSystemError
            expr: trading_errors_total > 10
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Trading system errors detected"
              description: "More than 10 trading errors in 1 minute"