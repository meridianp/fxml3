# Production-Ready FXML4 API Deployment with External Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fxml4-api
  namespace: fxml4
  labels:
    app: fxml4-api
    component: api
    version: "2.0"
    tier: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: fxml4-api
  template:
    metadata:
      labels:
        app: fxml4-api
        component: api
        version: "2.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      serviceAccountName: fxml4-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Database connectivity check
        - name: db-check
          image: postgres:16-alpine
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              echo "Checking external database connectivity..."
              pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"
              if [ $? -eq 0 ]; then
                echo "External TimescaleDB is ready"
              else
                echo "External database not ready, retrying..."
                sleep 5
                pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"
              fi
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fxml4-config
                  key: FXML4_DATABASE_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fxml4-config
                  key: FXML4_DATABASE_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: fxml4-config
                  key: FXML4_DATABASE_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fxml4-config
                  key: FXML4_DATABASE_NAME
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: fxml4-secrets
                  key: database-password

        # RabbitMQ connectivity check
        - name: rabbitmq-check
          image: rabbitmq:3.12-management-alpine
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              echo "Checking RabbitMQ connectivity..."
              until nc -z rabbitmq 5672; do
                echo "Waiting for RabbitMQ..."
                sleep 2
              done
              echo "RabbitMQ is ready"

      containers:
        - name: api
          image: ghcr.io/meridianp/fxml4-api:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: FXML4_SERVICE_NAME
              value: "api"
            - name: FXML4_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FXML4_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FXML4_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: fxml4-config
            - secretRef:
                name: fxml4-secrets
          command: ["python", "-m", "fxml4.api.main"]
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "1Gi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startup
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 12
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
            - name: models-volume
              mountPath: /app/models
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/cache

        # Sidecar: Log aggregation
        - name: log-aggregator
          image: fluent/fluent-bit:2.2
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
            - name: app-logs
              mountPath: /var/log/fxml4
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: fxml4-data-pvc
        - name: models-volume
          persistentVolumeClaim:
            claimName: fxml4-models-pvc
        - name: tmp-volume
          emptyDir:
            sizeLimit: 1Gi
        - name: app-cache
          emptyDir:
            sizeLimit: 2Gi
        - name: app-logs
          emptyDir:
            sizeLimit: 500Mi
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config

      # Pod scheduling and affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["fxml4-api"]
                topologyKey: kubernetes.io/hostname

      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: fxml4-api

---
# Service Account with minimal permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fxml4-api-sa
  namespace: fxml4
  labels:
    app: fxml4-api
    component: api
automountServiceAccountToken: false

---
# Role for API service
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: fxml4
  name: fxml4-api-role
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fxml4-api-binding
  namespace: fxml4
subjects:
  - kind: ServiceAccount
    name: fxml4-api-sa
    namespace: ftml4
roleRef:
  kind: Role
  name: fxml4-api-role
  apiGroup: rbac.authorization.k8s.io

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fxml4-api-hpa
  namespace: fxml4
  labels:
    app: fxml4-api
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fxml4-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fxml4-api-pdb
  namespace: fxml4
  labels:
    app: fxml4-api
    component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fxml4-api
