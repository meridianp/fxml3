apiVersion: apps/v1
kind: Deployment
metadata:
  name: fxml4-api
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: api
    environment: production
    version: v1.0.0
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "FXML4 Trading API - Production Deployment"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fxml4-api
      component: api
      environment: production
  template:
    metadata:
      labels:
        app: fxml4-api
        component: api
        environment: production
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        config.hash: "{{ configmap_hash }}"  # Force pod restart on config change
    spec:
      serviceAccountName: fxml4-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: fxml4-api
        image: ghcr.io/fxml4/fxml4-api:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        # Configuration from ConfigMap
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: API_PORT
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: API_HOST
        - name: API_WORKERS
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: API_WORKERS
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: LOG_LEVEL
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: DATABASE_NAME
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: REDIS_HOST
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: fxml4-api-config
              key: RABBITMQ_HOST
        
        # Sensitive data from Secrets
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: DATABASE_PASSWORD
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: JWT_SECRET_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: OPENAI_API_KEY
              optional: true
        - name: ALPHAVANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: fxml4-api-secrets
              key: ALPHAVANTAGE_API_KEY
              optional: true
        
        # Resource Management
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        
        # Health Checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        # Startup Probe for slow-starting applications
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 10
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        
        # Volume Mounts
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      
      # Volumes
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      - name: config-volume
        configMap:
          name: fxml4-api-config
      
      # Pod Scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - fxml4-api
              topologyKey: kubernetes.io/hostname
      
      # Tolerations and Node Selection
      tolerations:
      - key: "trading-workload"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      nodeSelector:
        workload-type: trading
      
      # Image Pull Secrets
      imagePullSecrets:
      - name: fxml4-registry-secret
      
      # DNS and Service Account
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 60

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fxml4-api-hpa
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: autoscaling
    environment: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fxml4-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fxml4-api-pdb
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: availability
    environment: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fxml4-api
      component: api
      environment: production

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fxml4-api-sa
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: rbac
    environment: production
automountServiceAccountToken: false

---
# Role for API permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fxml4-api-role
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: rbac
    environment: production
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["fxml4-api-secrets"]

---
# Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fxml4-api-rolebinding
  namespace: fxml4-production
  labels:
    app: fxml4-api
    component: rbac
    environment: production
subjects:
- kind: ServiceAccount
  name: fxml4-api-sa
  namespace: fxml4-production
roleRef:
  kind: Role
  name: fxml4-api-role
  apiGroup: rbac.authorization.k8s.io