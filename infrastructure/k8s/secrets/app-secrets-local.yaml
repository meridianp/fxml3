apiVersion: v1
kind: Secret
metadata:
  name: fxml4-secrets
  namespace: fxml4
type: Opaque
stringData:
  # Database (Local PostgreSQL with TimescaleDB)
  # SECURITY: These should be set from environment variables in production
  database-url: "postgresql://postgres:changeme@db:5432/fxml4"
  database-password: "changeme"
  database-host: "db"
  database-port: "5432"
  database-user: "postgres"
  database-name: "fxml4"

  # RabbitMQ
  rabbitmq-url: "amqp://guest:changeme@rabbitmq:5672"
  rabbitmq-password: "changeme"

  # Redis
  redis-url: "redis://redis:6379"
  redis-password: ""

  # API Keys (placeholder values - replace with real keys)
  openai-api-key: "sk-placeholder"
  anthropic-api-key: "sk-ant-placeholder"
  polygon-api-key: "placeholder"
  alpha-vantage-api-key: "placeholder"
  fred-api-key: "placeholder"

  # Interactive Brokers
  ib-gateway-host: "localhost"
  ib-gateway-port: "7497"
  ib-client-id: "1"

  # Pinecone
  pinecone-api-key: "placeholder"
  pinecone-environment: "us-east-1-aws"

  # Grafana
  grafana-password: "changeme-admin-password"
