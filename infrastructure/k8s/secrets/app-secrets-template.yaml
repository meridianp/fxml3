# This is a template for creating app secrets from GitHub Secrets
# The actual values will be substituted during CI/CD deployment
apiVersion: v1
kind: Secret
metadata:
  name: fxml4-secrets
  namespace: fxml4
type: Opaque
stringData:
  # Database (External PostgreSQL with TimescaleDB)
  database-url: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
  database-password: "${DB_PASSWORD}"
  database-host: "${DB_HOST}"
  database-port: "${DB_PORT}"
  database-user: "${DB_USER}"
  database-name: "${DB_NAME}"

  # RabbitMQ
  rabbitmq-url: "amqp://fxml4:${RABBITMQ_PASSWORD}@rabbitmq:5672"
  rabbitmq-password: "${RABBITMQ_PASSWORD}"

  # Redis
  redis-url: "redis://:${REDIS_PASSWORD}@redis:6379"
  redis-password: "${REDIS_PASSWORD}"

  # API Keys
  openai-api-key: "${OPENAI_API_KEY}"
  anthropic-api-key: "${ANTHROPIC_API_KEY}"
  polygon-api-key: "${POLYGON_API_KEY}"
  alpha-vantage-api-key: "${ALPHA_VANTAGE_API_KEY}"
  fred-api-key: "${FRED_API_KEY}"

  # Interactive Brokers
  ib-gateway-host: "${IB_GATEWAY_HOST}"
  ib-gateway-port: "${IB_GATEWAY_PORT}"
  ib-client-id: "${IB_CLIENT_ID}"

  # Pinecone
  pinecone-api-key: "${PINECONE_API_KEY}"
  pinecone-environment: "${PINECONE_ENVIRONMENT}"

  # Grafana
  grafana-password: "${GRAFANA_PASSWORD}"
