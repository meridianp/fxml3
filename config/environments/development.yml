# FXML4 Development Environment Configuration
# For local development and testing

environment: development
debug: true
log_level: DEBUG

# Database configuration
database:
  host: localhost
  port: 5432
  name: fxml4_dev
  user: fxml4_dev
  password: dev_password  # pragma: allowlist secret
  pool_size: 5
  max_overflow: 10
  echo: true  # SQL query logging for development

# Redis configuration
redis:
  host: localhost
  port: 6379
  db: 0
  password: null
  max_connections: 10

# RabbitMQ configuration
rabbitmq:
  host: localhost
  port: 5672
  user: fxml4_dev
  password: dev_password  # pragma: allowlist secret
  virtual_host: /fxml4_dev

# Trading system configuration
trading:
  mode: sandbox
  paper_trading: true
  max_position_size: 10000
  stop_loss_percentage: 2.0
  take_profit_percentage: 5.0

  # Risk management (relaxed for development)
  risk_management:
    max_daily_drawdown: 5.0
    max_position_percentage: 10.0
    max_correlation_threshold: 0.8

  # Market data
  market_data:
    provider: mock
    update_interval: 1  # seconds
    cache_duration: 300  # 5 minutes

# Elliott Wave configuration
elliott_wave:
  confidence_threshold: 0.6
  lookback_periods: 100
  analysis_timeframes: [1h, 4h, 1d]

# API configuration
api:
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: true
  cors_origins:
    - http://localhost:3000
    - http://localhost:3001
    - http://127.0.0.1:3000

# Security configuration (development settings)
security:
  secret_key: "dev-secret-key-change-in-production"  # pragma: allowlist secret
  algorithm: HS256
  access_token_expire_minutes: 30
  allowed_origins:
    - http://localhost:3000
    - http://localhost:3001

# Monitoring and observability
monitoring:
  enable_metrics: true
  metrics_port: 8080
  enable_tracing: false
  log_requests: true

# Performance settings
performance:
  latency_sla_ms: 10  # Relaxed for development
  cache_enabled: true
  async_processing: true

# External services (development/mock)
external_services:
  brokers:
    ib:
      enabled: false
      host: localhost
      port: 7497
      client_id: 1
    fxcm:
      enabled: false
      environment: demo

  news_providers:
    enabled: false

# Feature flags
features:
  mutation_testing: true
  property_based_testing: true
  performance_monitoring: true
  real_time_alerts: false
  advanced_analytics: true
