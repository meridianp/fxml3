# FXCM Demo Account Credentials for Paper Trading
# WARNING: This file contains sensitive credentials - ensure it's added to .gitignore

fxcm_demo:
  username: "0x0c9@quatumchain.com"
  password: "QkPh4%mVHKQ6Li"
  server: "FXCM-USDDemo1"
  account_type: "demo"
  environment: "paper_trading"
  
  # Connection settings
  connection:
    timeout: 30
    retry_attempts: 3
    heartbeat_interval: 30
    
  # Trading settings
  trading:
    default_currency: "USD"
    max_position_size: 1000000  # 1M units
    risk_limit_percentage: 2.0  # 2% risk per trade
    
  # Market data settings
  market_data:
    symbols: 
      - "EUR/USD"
      - "GBP/USD" 
      - "USD/JPY"
      - "USD/CHF"
      - "AUD/USD"
      - "USD/CAD"
      - "NZD/USD"
    update_frequency: "tick"
    
  # Logging and monitoring
  monitoring:
    log_level: "INFO"
    enable_metrics: true
    alert_on_disconnect: true