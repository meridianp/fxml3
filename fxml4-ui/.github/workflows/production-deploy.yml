name: Production Deployment

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ui

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test -- --coverage --watchAll=false

      - name: Run E2E tests
        run: |
          npx playwright install --with-deps
          npm run test:e2e

      - name: Run performance benchmarks
        run: node scripts/performance-benchmarks.js
        env:
          BENCHMARK_SUITE: lighthouse,bundle-analysis

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            e2e-results/
            benchmarks/reports/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-test.outputs.image-tag }}
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubectl
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to staging
        run: |
          export KUBECONFIG=kubeconfig
          export IMAGE_TAG="${{ needs.build-and-test.outputs.image-tag }}"

          # Update image in deployment
          sed -i "s|ghcr.io/fxml4/ui:latest|${IMAGE_TAG}|g" k8s/deployment.yaml

          # Apply Kubernetes manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/deployment.yaml

          # Wait for rollout to complete
          kubectl rollout status deployment/fxml4-ui -n fxml4-ui --timeout=300s

      - name: Run smoke tests
        run: |
          export KUBECONFIG=kubeconfig

          # Get staging URL
          STAGING_URL=$(kubectl get ingress fxml4-ui-ingress -n ftml4-ui -o jsonpath='{.spec.rules[0].host}')

          # Wait for service to be ready
          sleep 30

          # Run basic health check
          curl -f "https://${STAGING_URL}/api/health" || exit 1

          # Run critical E2E tests
          PLAYWRIGHT_BASE_URL="https://${STAGING_URL}" npm run test:e2e -- --grep "critical"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan, deploy-staging]
    if: (github.ref == 'refs/heads/main' && needs.deploy-staging.result == 'success') || (startsWith(github.ref, 'refs/tags/v') && github.event.inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure kubectl
        run: |
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Create deployment backup
        run: |
          export KUBECONFIG=kubeconfig

          # Create backup of current deployment
          kubectl get deployment fxml4-ui -n fxml4-ui -o yaml > deployment-backup.yaml || true

          # Store backup as artifact
          echo "BACKUP_CREATED=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Deploy to production
        run: |
          export KUBECONFIG=kubeconfig
          export IMAGE_TAG="${{ needs.build-and-test.outputs.image-tag }}"

          # Update image in deployment
          sed -i "s|ghcr.io/fxml4/ui:latest|${IMAGE_TAG}|g" k8s/deployment.yaml

          # Apply Kubernetes manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml

          # Wait for rollout to complete
          kubectl rollout status deployment/fxml4-ui -n fxml4-ui --timeout=600s

      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig

          # Check pod status
          kubectl get pods -n fxml4-ui -l app.kubernetes.io/name=fxml4-ui

          # Check service endpoints
          kubectl get endpoints fxml4-ui-service -n fxml4-ui

          # Get production URL
          PRODUCTION_URL=$(kubectl get ingress fxml4-ui-ingress -n fxml4-ui -o jsonpath='{.spec.rules[0].host}')

          # Wait for service to be ready
          sleep 60

          # Run health check
          curl -f "https://${PRODUCTION_URL}/api/health" || exit 1

          echo "Deployment verification completed successfully"

      - name: Run post-deployment tests
        run: |
          export KUBECONFIG=kubeconfig
          PRODUCTION_URL=$(kubectl get ingress fxml4-ui-ingress -n fxml4-ui -o jsonpath='{.spec.rules[0].host}')

          # Run production smoke tests
          PLAYWRIGHT_BASE_URL="https://${PRODUCTION_URL}" npm run test:e2e -- --grep "smoke"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Successfully deployed FXML4 UI to production"
          echo "📊 Image: ${{ needs.build-and-test.outputs.image-tag }}"
          echo "🔗 URL: https://app.fxml4.com"

      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=kubeconfig

          if [ -f "deployment-backup.yaml" ]; then
            echo "🔄 Rolling back deployment..."
            kubectl apply -f deployment-backup.yaml
            kubectl rollout status deployment/fxml4-ui -n fxml4-ui --timeout=300s
            echo "✅ Rollback completed"
          else
            echo "❌ No backup found, manual intervention required"
          fi

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: deployment-artifacts
          path: |
            deployment-backup.yaml
            kubeconfig

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            COLOR="good"
            EMOJI="🚀"
            MESSAGE="Production deployment successful"
          else
            COLOR="danger"
            EMOJI="❌"
            MESSAGE="Production deployment failed"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$EMOJI FXML4 UI Deployment\",
                \"text\": \"$MESSAGE\",
                \"fields\": [
                  {\"title\": \"Environment\", \"value\": \"Production\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                  {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ],
                \"footer\": \"FXML4 Deployment\",
                \"ts\": $(date +%s)
              }]
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
