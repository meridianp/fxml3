name: Performance CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run performance benchmarks daily at 2 AM UTC
    - cron: "0 2 * * *"

env:
  NODE_VERSION: "18"
  CACHE_VERSION: "v1"

jobs:
  performance-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        suite:
          [
            "lighthouse",
            "bundle-analysis",
            "component-performance",
            "api-performance",
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install -g lighthouse
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Cache build artifacts
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
            node_modules/.cache
          key: ${{ runner.os }}-build-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.CACHE_VERSION }}-

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run performance benchmarks
        id: benchmarks
        run: node scripts/performance-benchmarks.js
        env:
          BENCHMARK_SUITE: ${{ matrix.suite }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-reports-${{ matrix.suite }}
          path: |
            benchmarks/reports/
            benchmarks/*.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            try {
              const summaryPath = 'benchmarks/reports/ci-summary.json';
              if (fs.existsSync(summaryPath)) {
                const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));

                const body = `## 🚀 Performance Benchmark Results - ${{ matrix.suite }}

                ### Summary
                - ✅ **Passed**: ${summary.passed}
                - ❌ **Failed**: ${summary.failed}
                - 📈 **Improved**: ${summary.improved}
                - 📉 **Degraded**: ${summary.degraded}

                ### Status
                ${summary.success ? '✅ All benchmarks passed!' : '❌ Some benchmarks failed'}

                ${summary.criticalIssues > 0 ? `⚠️ **${summary.criticalIssues} critical issues** need attention` : ''}

                <details>
                <summary>View detailed results</summary>

                [View full performance report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

                </details>`;

                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: body
                });
              }
            } catch (error) {
              console.log('Could not post comment:', error.message);
            }

      - name: Check performance thresholds
        run: |
          # Fail the job if performance benchmarks failed
          if [ -f "benchmarks/reports/ci-summary.json" ]; then
            SUCCESS=$(cat benchmarks/reports/ci-summary.json | jq -r '.success')
            if [ "$SUCCESS" = "false" ]; then
              echo "❌ Performance benchmarks failed"
              exit 1
            fi
          fi

  bundle-size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and analyze bundle
        run: |
          npm run build
          npm run analyze:bundle

      - name: Check bundle size limits
        run: npx bundlesize
        continue-on-error: true

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v3
        with:
          name: bundle-analysis
          path: |
            analyze/
            .next/analyze/

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run visual regression tests
        run: npm run test:visual:ci
        env:
          CI: true

      - name: Upload visual test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: visual-regression-results
          path: |
            e2e-results/visual/
            test-results/

  lighthouse-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @lhci/cli@0.12.x

      - name: Build application
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  cross-browser-performance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run cross-browser performance tests
        run: |
          npm run test:performance -- --project ${{ matrix.browser }}

      - name: Upload browser-specific results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-${{ matrix.browser }}
          path: e2e-results/performance/

  performance-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [performance-analysis, bundle-size-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download baseline performance data
        uses: actions/download-artifact@v3
        with:
          name: performance-baseline
          path: baseline/
        continue-on-error: true

      - name: Download current performance data
        uses: actions/download-artifact@v3
        with:
          name: performance-reports-lighthouse
          path: current/

      - name: Compare performance metrics
        run: |
          node -e "
          const fs = require('fs');

          const compareMetrics = (current, baseline) => {
            if (!baseline) return { status: 'no-baseline', message: 'No baseline data available' };

            const changes = [];
            const currentMetrics = current.benchmarks?.lighthouse?.metrics || {};
            const baselineMetrics = baseline.benchmarks?.lighthouse?.metrics || {};

            for (const [metric, value] of Object.entries(currentMetrics)) {
              const baselineValue = baselineMetrics[metric];
              if (baselineValue) {
                const change = ((value - baselineValue) / baselineValue) * 100;
                if (Math.abs(change) > 5) { // 5% threshold
                  changes.push({
                    metric,
                    current: value,
                    baseline: baselineValue,
                    change: change.toFixed(1) + '%',
                    regression: change > 0
                  });
                }
              }
            }

            return {
              status: changes.some(c => c.regression) ? 'regression' : 'improvement',
              changes
            };
          };

          try {
            const current = JSON.parse(fs.readFileSync('current/performance-benchmarks.json', 'utf8'));
            let baseline = null;

            try {
              baseline = JSON.parse(fs.readFileSync('baseline/performance-benchmarks.json', 'utf8'));
            } catch (e) {
              console.log('No baseline found');
            }

            const comparison = compareMetrics(current, baseline);

            console.log('Performance Comparison Result:');
            console.log(JSON.stringify(comparison, null, 2));

            if (comparison.status === 'regression') {
              console.log('::error::Performance regression detected');
              process.exit(1);
            }
          } catch (error) {
            console.log('Could not compare performance metrics:', error.message);
          }
          "

  performance-report:
    runs-on: ubuntu-latest
    needs:
      [
        performance-analysis,
        bundle-size-check,
        visual-regression,
        lighthouse-ci,
        cross-browser-performance,
      ]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate consolidated report
        run: |
          mkdir -p consolidated-report

          # Combine all performance reports
          node -e "
          const fs = require('fs');
          const path = require('path');

          const consolidatedReport = {
            timestamp: new Date().toISOString(),
            commit: '${{ github.sha }}',
            branch: '${{ github.ref_name }}',
            pr: '${{ github.event.number }}',
            reports: {}
          };

          // Collect all performance reports
          const artifactDirs = fs.readdirSync('.').filter(dir =>
            fs.statSync(dir).isDirectory() && dir.startsWith('performance-reports-')
          );

          for (const dir of artifactDirs) {
            const suite = dir.replace('performance-reports-', '');
            const reportPath = path.join(dir, 'performance-benchmarks.json');

            if (fs.existsSync(reportPath)) {
              try {
                consolidatedReport.reports[suite] = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              } catch (error) {
                console.log(\`Could not read report for \${suite}: \${error.message}\`);
              }
            }
          }

          // Generate summary
          const summary = {
            totalSuites: Object.keys(consolidatedReport.reports).length,
            passedSuites: 0,
            failedSuites: 0,
            overallStatus: 'unknown'
          };

          for (const [suite, report] of Object.entries(consolidatedReport.reports)) {
            if (report.summary?.failed === 0) {
              summary.passedSuites++;
            } else {
              summary.failedSuites++;
            }
          }

          summary.overallStatus = summary.failedSuites === 0 ? 'passed' : 'failed';
          consolidatedReport.summary = summary;

          fs.writeFileSync('consolidated-report/performance-summary.json', JSON.stringify(consolidatedReport, null, 2));

          console.log('Consolidated Performance Report:');
          console.log(\`- Total Suites: \${summary.totalSuites}\`);
          console.log(\`- Passed: \${summary.passedSuites}\`);
          console.log(\`- Failed: \${summary.failedSuites}\`);
          console.log(\`- Overall Status: \${summary.overallStatus}\`);
          "

      - name: Upload consolidated report
        uses: actions/upload-artifact@v3
        with:
          name: consolidated-performance-report
          path: consolidated-report/

      - name: Update performance baseline
        if: github.ref == 'refs/heads/main' && success()
        run: |
          # Store the current performance data as new baseline
          cp consolidated-report/performance-summary.json performance-baseline.json

      - name: Cache performance baseline
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/cache/save@v3
        with:
          path: performance-baseline.json
          key: performance-baseline-${{ github.sha }}

  performance-notification:
    runs-on: ubuntu-latest
    needs: [performance-report]
    if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'schedule')

    steps:
      - name: Download consolidated report
        uses: actions/download-artifact@v3
        with:
          name: consolidated-performance-report

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL
        run: |
          REPORT=$(cat performance-summary.json)
          STATUS=$(echo $REPORT | jq -r '.summary.overallStatus')
          PASSED=$(echo $REPORT | jq -r '.summary.passedSuites')
          FAILED=$(echo $REPORT | jq -r '.summary.failedSuites')

          if [ "$STATUS" = "passed" ]; then
            COLOR="good"
            EMOJI="✅"
          else
            COLOR="danger"
            EMOJI="❌"
          fi

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$EMOJI FXML4 Performance Report\",
                \"text\": \"Performance benchmarks completed\",
                \"fields\": [
                  {\"title\": \"Status\", \"value\": \"$STATUS\", \"short\": true},
                  {\"title\": \"Passed\", \"value\": \"$PASSED\", \"short\": true},
                  {\"title\": \"Failed\", \"value\": \"$FAILED\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true}
                ],
                \"footer\": \"FXML4 Performance CI\",
                \"ts\": $(date +%s)
              }]
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
