# FXML4 UI Production Docker Compose Configuration
version: "3.8"

services:
  fxml4-ui:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        NODE_ENV: production
    container_name: fxml4-ui-prod
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:8001}
      - NEXT_PUBLIC_ENVIRONMENT=production
    networks:
      - fxml4-network
    volumes:
      - ui_cache:/app/.next/cache
      - ./logs:/app/logs
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fxml4-ui.rule=Host(`${UI_DOMAIN:-localhost}`)"
      - "traefik.http.routers.fxml4-ui.tls=true"
      - "traefik.http.services.fxml4-ui.loadbalancer.server.port=3000"

  nginx:
    image: nginx:alpine
    container_name: fxml4-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/var/www/static:ro
    networks:
      - fxml4-network
    depends_on:
      - fxml4-ui
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: fxml4-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - fxml4-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  ui_cache:
    driver: local
  redis_data:
    driver: local

networks:
  fxml4-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
