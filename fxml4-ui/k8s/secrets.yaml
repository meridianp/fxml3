# FXML4 UI Kubernetes Secrets Template
# NOTE: This is a template. Actual secrets should be created separately and not committed to version control.

apiVersion: v1
kind: Secret
metadata:
  name: fxml4-ui-secrets
  namespace: fxml4-ui
  labels:
    app.kubernetes.io/name: fxml4-ui
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  # Redis connection string
  redis-url: "redis://redis-service:6379"
  
  # External service API keys (replace with actual values)
  sentry-dsn: "https://your-sentry-dsn@sentry.io/project-id"
  google-analytics-id: "GA-XXXXXXXXX"
  amplitude-api-key: "your-amplitude-api-key"
  
  # JWT signing secret
  jwt-secret: "your-super-secret-jwt-signing-key"
  
  # Database connection (if needed for API calls)
  database-url: "postgresql://user:password@postgres:5432/fxml4"

---
# GitHub Container Registry Secret for pulling images
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: fxml4-ui
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "your-github-username",
          "password": "your-github-token",
          "auth": "base64-encoded-username:token"
        }
      }
    }