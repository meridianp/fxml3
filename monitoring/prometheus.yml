# Prometheus configuration for FXML4-ForexConnect integration monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "fxml4-forex-monitor"

rule_files:
  - "rules/*.yml"
  - "alert_rules.yml"

scrape_configs:
  # FXML4 API metrics
  - job_name: "fxml4-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  # ForexConnect middleware metrics
  - job_name: "forex-middleware"
    static_configs:
      - targets: ["forex-middleware:9090"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  # RabbitMQ metrics (via management plugin)
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15672"]
    metrics_path: "/api/metrics"
    scrape_interval: 30s
    basic_auth:
      username: "fxml4"
      password: "fxml4_pass"

  # TimescaleDB/PostgreSQL metrics
  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]
    scrape_interval: 30s

  # Redis metrics
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093
